<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./js/theme.js"></script>
    <title>Confirmar E-mail - Sistema Operante</title>

    <!-- PWA Config -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="js/pwa-init.js"></script>

    <link rel="stylesheet" href="./css/tokens.css">
    <link rel="stylesheet" href="./css/aero.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'], display: ['Outfit','sans-serif'] } } } }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='20' cy='20' r='10' fill='%234f46e5'/><circle cx='80' cy='30' r='8' fill='%234f46e5'/><circle cx='50' cy='70' r='12' fill='%234f46e5'/><line x1='20' y1='20' x2='80' y2='30' stroke='%234f46e5' stroke-width='5'/><line x1='80' y1='30' x2='50' y2='70' stroke='%234f46e5' stroke-width='5'/></svg>">
    <style>
        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        /* ---- Card de autenticação ---- */
        .auth-card {
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            padding: 32px;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--grad-brand);
        }

        .auth-logo {
            width: 48px;
            height: 48px;
            margin: 0 auto 16px;
            border-radius: 14px;
            background: var(--grad-brand);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 6px 18px rgba(79, 70, 229, .35);
        }

        /* Círculo de status (usado no markup e nas trocas de innerHTML via JS) */
        .status-circle {
            width: 80px;
            height: 80px;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            font-size: 36px;
        }

        /* ---- Page loader (simplificado) ---- */
        #page-loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--dur-slow) var(--ease), visibility var(--dur-slow);
        }

        #page-loader.visible {
            opacity: 1;
            visibility: visible;
        }

        .loader-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--brand-600);
            border-radius: 50%;
            animation: aero-spin .8s linear infinite;
        }

        @keyframes aero-spin { to { transform: rotate(360deg); } }

        .loader-text {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            text-align: center;
            color: var(--text-muted);
            min-height: 1.5em;
            transition: opacity .5s ease;
        }
    </style>
</head>

<body>
    <!-- Page Loader -->
    <div id="page-loader" class="visible">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <div id="loader-message" class="loader-text">Confirmando seu E-mail</div>
        </div>
    </div>

    <div class="surface-raised auth-card text-center">
        <div class="auth-logo"><i class="fa-solid fa-plane-up"></i></div>
        <div id="status-icon" class="mb-6 mt-2">
            <div class="status-circle" style="background: var(--brand-50); color: var(--brand-600);">
                <i class="fas fa-spinner fa-spin"></i>
            </div>
        </div>
        <h2 id="status" class="text-2xl font-extrabold mb-4 tracking-tight">Verificando...</h2>
        <p id="message" class="font-medium mb-8 leading-relaxed" style="color: var(--text-muted);">Aguarde um momento enquanto confirmamos sua conta.</p>
        <a href="login.html" id="btn" class="hidden btn btn-primary btn-lg">Ir para Login</a>
    </div>

    <script>
        // Mensagens do Loader
        const loaderMessages = ["Processando token...", "Autenticando e-mail...", "Finalizando segurança...", "Quase lá!"];
        let msgIndex = 0;
        const msgEl = document.getElementById('loader-message');
        setInterval(() => {
            if (!msgEl) return;
            msgEl.style.opacity = '0';
            setTimeout(() => {
                msgIndex = (msgIndex + 1) % loaderMessages.length;
                msgEl.textContent = loaderMessages[msgIndex];
                msgEl.style.opacity = '1';
            }, 500);
        }, 2000);
    </script>

    <script type="module">
        import { api } from './js/api.js';

        async function confirm(token) {
            const res = await fetch('https://backend-aerofestas-production.up.railway.app/api/auth/confirm-email', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token })
            });
            return await res.json();
        }

        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');
        const statusEl = document.getElementById('status');
        const msgEl = document.getElementById('message');
        const statusIconContainer = document.getElementById('status-icon');
        const btn = document.getElementById('btn');
        const loader = document.getElementById('page-loader');

        if (token) {
            confirm(token).then(data => {
                if (loader) loader.classList.remove('visible');

                if (data.message) {
                    statusIconContainer.innerHTML = '<div class="status-circle" style="background: var(--success-soft); color: var(--success);"><i class="fas fa-check-circle"></i></div>';
                    statusEl.textContent = "Sucesso! 🎉";
                    statusEl.className = "text-2xl font-extrabold text-emerald-600 mb-4 tracking-tight";
                    msgEl.textContent = "Seu e-mail foi confirmado com sucesso. Agora você pode acessar todas as funcionalidades.";
                    btn.classList.remove('hidden');
                } else {
                    throw new Error(data.error);
                }
            }).catch(err => {
                if (loader) loader.classList.remove('visible');
                statusIconContainer.innerHTML = '<div class="status-circle" style="background: var(--danger-soft); color: var(--danger);"><i class="fas fa-exclamation-triangle"></i></div>';
                statusEl.textContent = "Ops! Algo deu errado";
                statusEl.className = "text-2xl font-extrabold text-red-600 mb-4 tracking-tight";
                msgEl.textContent = "O link de confirmação parece inválido ou já expirou. Por favor, tente solicitar um novo ou entre em contato com o suporte.";
                btn.textContent = "Voltar ao Início";
                btn.classList.remove('hidden');
            });
        } else {
            if (loader) loader.classList.remove('visible');
            statusIconContainer.innerHTML = '<div class="status-circle" style="background: var(--warning-soft); color: var(--warning);"><i class="fas fa-link-slash"></i></div>';
            statusEl.textContent = "Link Inválido";
            msgEl.textContent = "Não encontramos o código de confirmação no link. Verifique se o endereço está correto.";
            btn.textContent = "Ir para o Login";
            btn.classList.remove('hidden');
        }
    </script>
</body>

</html>
