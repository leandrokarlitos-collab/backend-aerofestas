<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Propostas geradas · Aero Festas</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4f46e5">
<link rel="icon" href="./icons/Logo_Aero_Festas.png" type="image/png">

<script src="js/pwa-init.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800;900&display=swap" rel="stylesheet">

<style>
    body {
        font-family: 'Inter', sans-serif;
        background:
            radial-gradient(1200px 600px at 10% -10%, rgba(168,85,247,0.18), transparent 60%),
            radial-gradient(1000px 500px at 110% 110%, rgba(79,70,229,0.18), transparent 60%),
            linear-gradient(180deg, #eef2ff 0%, #f8fafc 100%);
        min-height: 100vh;
        padding-bottom: 140px;
    }
    h1, h2, h3 { font-family: 'Outfit', sans-serif; }

    .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        margin-bottom: 18px;
    }
    .search-wrap {
        position: relative;
        flex: 1;
        min-width: 200px;
        max-width: 360px;
    }
    .search-wrap i {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: #94a3b8;
    }
    .search-wrap input {
        width: 100%;
        padding: 10px 12px 10px 38px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        font-size: 0.9rem;
        color: #0f172a;
    }
    .search-wrap input:focus {
        outline: none;
        border-color: #4f46e5;
        box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
    }
    .status-filter {
        padding: 10px 14px;
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(10px);
        font-size: 0.88rem;
        color: #475569;
        font-weight: 600;
        cursor: pointer;
    }

    .btn-primary {
        background: linear-gradient(135deg, #4f46e5, #a855f7);
        color: #fff;
        padding: 10px 18px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 0.9rem;
        border: none;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        box-shadow: 0 10px 24px rgba(79, 70, 229, 0.3);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        text-decoration: none;
    }
    .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 16px 32px rgba(79, 70, 229, 0.4); }

    .prop-card {
        background: rgba(255, 255, 255, 0.72);
        backdrop-filter: blur(16px) saturate(160%);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 20px;
        padding: 18px 20px;
        box-shadow: 0 8px 28px rgba(31, 38, 135, 0.08);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: start;
    }
    .prop-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 36px rgba(31, 38, 135, 0.12);
    }
    .prop-card .head {
        font-family: 'Outfit', sans-serif;
        font-weight: 700;
        font-size: 1.1rem;
        color: #0f172a;
        margin-bottom: 4px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
    }
    .prop-card .subhead {
        color: #64748b;
        font-size: 0.85rem;
        margin-bottom: 8px;
    }
    .prop-card .meta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        font-size: 0.78rem;
        color: #475569;
        margin-top: 8px;
    }
    .prop-card .meta-row span {
        display: inline-flex;
        align-items: center;
        gap: 5px;
    }
    .prop-card .meta-row i { color: #94a3b8; }

    .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 11px;
        border-radius: 999px;
        font-size: 0.7rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }
    .status-pill.draft { background: rgba(148, 163, 184, 0.18); color: #64748b; }
    .status-pill.sent { background: rgba(79, 70, 229, 0.15); color: #4338ca; }
    .status-pill.viewed { background: linear-gradient(135deg, #16a34a, #22c55e); color: #fff; }

    .actions {
        display: flex;
        gap: 6px;
        align-items: center;
        flex-shrink: 0;
        flex-wrap: wrap;
        justify-content: flex-end;
    }
    .act-btn {
        width: 36px;
        height: 36px;
        border-radius: 10px;
        border: 1px solid rgba(15, 23, 42, 0.06);
        background: rgba(255, 255, 255, 0.85);
        color: #475569;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition: all 0.15s ease;
        text-decoration: none;
        font-size: 0.85rem;
    }
    .act-btn:hover { color: #0f172a; background: #fff; transform: translateY(-1px); }
    .act-btn.primary { color: #4f46e5; }
    .act-btn.primary:hover { background: rgba(79, 70, 229, 0.08); }
    .act-btn.danger { color: #ef4444; }
    .act-btn.danger:hover { background: #fef2f2; }

    .url-row {
        margin-top: 10px;
        display: flex;
        gap: 6px;
        align-items: center;
        padding: 8px 12px;
        background: rgba(15, 23, 42, 0.03);
        border-radius: 10px;
        font-size: 0.78rem;
        color: #64748b;
    }
    .url-row code {
        flex: 1;
        font-family: 'Inter', sans-serif;
        color: #4338ca;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: 500;
    }
    .url-row button {
        border: none;
        background: transparent;
        color: #4f46e5;
        cursor: pointer;
        font-size: 0.78rem;
        padding: 2px 6px;
        font-weight: 600;
    }

    .empty-state {
        text-align: center;
        padding: 70px 20px;
        color: #94a3b8;
    }
    .empty-state i {
        font-size: 3rem;
        display: block;
        margin-bottom: 14px;
        opacity: 0.6;
    }
    .empty-state p { margin-bottom: 6px; }
    .empty-state .cta { margin-top: 20px; }

    @media (max-width: 640px) {
        .prop-card { grid-template-columns: 1fr; }
        .prop-card .actions { justify-content: flex-start; }
    }

    /* Toast */
    #toast {
        position: fixed;
        top: 20px;
        right: 20px;
        background: #0f172a;
        color: #fff;
        padding: 12px 20px;
        border-radius: 12px;
        font-weight: 600;
        font-size: 0.88rem;
        box-shadow: 0 14px 30px rgba(0, 0, 0, 0.3);
        transform: translateX(120%);
        transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        z-index: 10000;
    }
    #toast.show { transform: translateX(0); }
    #toast.success { background: linear-gradient(135deg, #16a34a, #22c55e); }
    #toast.error { background: linear-gradient(135deg, #dc2626, #ef4444); }
</style>
</head>

<body>

<main class="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-10">
    <header class="mb-8">
        <div class="flex items-center justify-between gap-4 mb-2">
            <h1 class="text-3xl sm:text-4xl font-bold text-slate-800 flex items-center gap-3">
                <i class="fas fa-file-invoice text-indigo-500"></i> Propostas geradas
            </h1>
            <a href="./Dashboard.html"
                class="hidden sm:inline-flex items-center gap-2 bg-white/60 hover:bg-white/80 text-slate-600 px-4 py-2 rounded-xl border border-white/40 shadow-sm transition-all">
                <i class="fas fa-arrow-left"></i> Voltar
            </a>
        </div>
        <p class="text-slate-500 text-sm">
            Todas as propostas geradas para seus clientes. Edite, duplique ou compartilhe novamente.
        </p>
    </header>

    <div class="toolbar">
        <div class="search-wrap">
            <i class="fas fa-search"></i>
            <input id="prop-search" type="text" placeholder="Buscar por cliente, evento ou slug…" autocomplete="off">
        </div>
        <select id="prop-status-filter" class="status-filter">
            <option value="">Todas</option>
            <option value="draft">Rascunho</option>
            <option value="sent">Enviada (não visualizada)</option>
            <option value="viewed">Visualizada pelo cliente</option>
        </select>

        <div style="margin-left:auto;display:flex;gap:8px;">
            <a href="./Configuracoes-Propostas.html" class="status-filter" style="text-decoration:none;display:inline-flex;align-items:center;gap:6px;">
                <i class="fas fa-sliders"></i> <span class="hidden sm:inline">Templates</span>
            </a>
            <a href="./Equipamentos.html" class="btn-primary">
                <i class="fas fa-plus"></i> Nova proposta
            </a>
        </div>
    </div>

    <section id="prop-list" class="space-y-3">
        <div style="text-align:center;color:#94a3b8;padding:60px 0;">
            <i class="fas fa-spinner fa-spin" style="font-size:1.6rem;margin-bottom:10px;"></i>
            <p>Carregando propostas…</p>
        </div>
    </section>
</main>

<div id="toast"></div>

<script type="module">
import { api, API_BASE_URL } from './js/api.js';

let allProps = [];

function showToast(msg, type = '') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = type;
    requestAnimationFrame(() => t.classList.add('show'));
    setTimeout(() => t.classList.remove('show'), 2800);
}

function esc(s) {
    return String(s ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;');
}

function formatBRL(v) {
    if (v == null || isNaN(v)) return '—';
    return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function formatDate(iso) {
    if (!iso) return '—';
    try {
        const d = new Date(iso);
        return d.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    } catch { return '—'; }
}

function statusLabel(s) {
    if (s === 'viewed') return { label: 'Visualizada', cls: 'viewed', icon: 'eye' };
    if (s === 'sent') return { label: 'Enviada', cls: 'sent', icon: 'paper-plane' };
    return { label: 'Rascunho', cls: 'draft', icon: 'pen-to-square' };
}

function renderList() {
    const search = (document.getElementById('prop-search').value || '').toLowerCase().trim();
    const statusFilter = document.getElementById('prop-status-filter').value;

    let filtered = allProps;
    if (statusFilter) filtered = filtered.filter(p => (p.status || 'draft') === statusFilter);
    if (search) {
        filtered = filtered.filter(p =>
            (p.clientName || '').toLowerCase().includes(search) ||
            (p.eventTitle || '').toLowerCase().includes(search) ||
            (p.slug || '').toLowerCase().includes(search)
        );
    }

    const list = document.getElementById('prop-list');
    if (!filtered.length) {
        if (allProps.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-file-invoice"></i>
                    <p style="font-weight:600;color:#475569;">Nenhuma proposta gerada ainda.</p>
                    <p style="font-size:0.85rem;">Crie a primeira proposta acessando a aba Equipamentos.</p>
                    <div class="cta">
                        <a href="./Equipamentos.html" class="btn-primary">
                            <i class="fas fa-plus"></i> Gerar primeira proposta
                        </a>
                    </div>
                </div>
            `;
        } else {
            list.innerHTML = `<div class="empty-state"><i class="fas fa-magnifying-glass"></i><p>Nenhuma proposta encontrada com esses filtros.</p></div>`;
        }
        return;
    }

    list.innerHTML = filtered.map(p => {
        const st = statusLabel(p.status);
        const url = `${window.location.origin}/p/${p.slug}`;
        const itemCount = (p.items || []).length;
        const totalLine = p.showPrices && p.total != null
            ? `<span><i class="fas fa-tag"></i> ${formatBRL(p.total)}</span>`
            : `<span style="color:#94a3b8;font-style:italic;"><i class="fas fa-eye-slash"></i> Sem valores</span>`;

        return `
            <article class="prop-card" data-id="${p.id}">
                <div>
                    <h3 class="head">
                        ${esc(p.clientName || 'Cliente')}
                        <span class="status-pill ${st.cls}"><i class="fas fa-${st.icon}"></i> ${st.label}</span>
                    </h3>
                    ${p.eventTitle ? `<div class="subhead">${esc(p.eventTitle)}${p.eventDate ? ' · ' + esc(p.eventDate.split('-').reverse().join('/')) : ''}</div>` : ''}
                    <div class="meta-row">
                        <span><i class="fas fa-cubes"></i> ${itemCount} brinquedo${itemCount === 1 ? '' : 's'}</span>
                        ${totalLine}
                        ${p.viewCount > 0 ? `<span><i class="fas fa-eye"></i> ${p.viewCount} visualização${p.viewCount === 1 ? '' : 'ões'}</span>` : ''}
                        <span title="Criada em ${formatDate(p.createdAt)}"><i class="fas fa-clock"></i> ${formatDate(p.createdAt)}</span>
                    </div>
                    <div class="url-row">
                        <code>${esc(url)}</code>
                        <button data-action="copy" data-url="${esc(url)}" title="Copiar link"><i class="fas fa-copy"></i> Copiar</button>
                    </div>
                </div>
                <div class="actions">
                    <a href="${esc(url)}" target="_blank" rel="noopener" class="act-btn primary" title="Abrir prévia em nova aba">
                        <i class="fas fa-up-right-from-square"></i>
                    </a>
                    <a href="https://wa.me/?text=${encodeURIComponent(`Olá! Segue a proposta da Aero Festas: ${url}`)}" target="_blank" rel="noopener" class="act-btn" title="Compartilhar via WhatsApp" style="color:#16a34a;">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                    <a href="./Equipamentos.html?edit-proposta=${p.id}" class="act-btn" title="Editar proposta">
                        <i class="fas fa-pen"></i>
                    </a>
                    <button class="act-btn" data-action="duplicate" title="Duplicar">
                        <i class="fas fa-clone"></i>
                    </button>
                    <button class="act-btn danger" data-action="delete" title="Excluir">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </article>
        `;
    }).join('');
}

document.getElementById('prop-list').addEventListener('click', async (e) => {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;
    const card = btn.closest('.prop-card');
    if (!card) return;
    const id = parseFloat(card.dataset.id);
    const proposta = allProps.find(p => p.id === id);
    if (!proposta) return;
    const action = btn.dataset.action;

    if (action === 'copy') {
        const url = btn.dataset.url;
        try {
            await navigator.clipboard.writeText(url);
            showToast('Link copiado!', 'success');
        } catch {
            showToast('Não foi possível copiar', 'error');
        }
    } else if (action === 'duplicate') {
        btn.disabled = true;
        const res = await api.duplicarProposta(id);
        btn.disabled = false;
        if (res?.success && res.data) {
            showToast(`Proposta duplicada (${res.data.slug})`, 'success');
            await loadProps();
        } else {
            showToast('Erro ao duplicar proposta', 'error');
        }
    } else if (action === 'delete') {
        if (!confirm(`Excluir a proposta para "${proposta.clientName}"?\n\nIsso apaga a proposta permanentemente. O link ${window.location.origin}/p/${proposta.slug} deixará de funcionar.`)) return;
        btn.disabled = true;
        const ok = await api.deletarProposta(id);
        btn.disabled = false;
        if (ok) {
            showToast('Proposta excluída', 'success');
            await loadProps();
        } else {
            showToast('Erro ao excluir proposta', 'error');
        }
    }
});

document.getElementById('prop-search').addEventListener('input', renderList);
document.getElementById('prop-status-filter').addEventListener('change', renderList);

async function loadProps() {
    allProps = await api.listarPropostas();
    if (!Array.isArray(allProps)) allProps = [];
    renderList();
}

loadProps();
</script>

<script src="js/protect.js"></script>
</body>
</html>
