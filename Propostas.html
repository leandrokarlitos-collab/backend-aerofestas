<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="./js/theme.js"></script>
<title>Propostas geradas · Aero Festas</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#4f46e5">
<link rel="icon" href="./icons/Logo_Aero_Festas.png" type="image/png">

<script src="js/pwa-init.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<script>
    tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'], display: ['Outfit','sans-serif'] } } } };
</script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./css/tokens.css">
<link rel="stylesheet" href="./css/aero.css">

<style>
    /* ---- Propostas: mínimos específicos da página (tokens do DS) ---- */
    .toolbar {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
        margin-bottom: 18px;
    }
    .search-wrap { position: relative; flex: 1; min-width: 200px; max-width: 360px; }
    .search-wrap > i {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text-faint);
        pointer-events: none;
    }
    .search-wrap .input { padding-left: 38px; }
    #prop-status-filter { width: auto; }

    .prop-card {
        padding: 18px 20px;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 16px;
        align-items: start;
    }
    .prop-card .head {
        font-family: var(--font-display);
        font-weight: 700;
        font-size: 1.1rem;
        color: var(--text);
        margin-bottom: 4px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
    }
    .prop-card .subhead { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 8px; }
    .prop-card .meta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 14px;
        font-size: 0.78rem;
        color: var(--text-muted);
        margin-top: 8px;
    }
    .prop-card .meta-row span { display: inline-flex; align-items: center; gap: 5px; }
    .prop-card .meta-row i { color: var(--text-faint); }

    .url-row {
        margin-top: 10px;
        display: flex;
        gap: 6px;
        align-items: center;
        padding: 8px 12px;
        background: var(--surface-inset);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        font-size: 0.78rem;
        color: var(--text-muted);
    }
    .url-row code {
        flex: 1;
        font-family: var(--font-body);
        color: var(--brand-600);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: 500;
    }
    .url-row button {
        border: none;
        background: transparent;
        color: var(--brand-600);
        cursor: pointer;
        font-size: 0.78rem;
        padding: 2px 6px;
        font-weight: 600;
    }
    .dark .url-row code, .dark .url-row button { color: var(--brand-400); }

    .actions {
        display: flex;
        gap: 6px;
        align-items: center;
        flex-shrink: 0;
        flex-wrap: wrap;
        justify-content: flex-end;
    }
    .actions .act-open { color: var(--brand-600); }
    .dark .actions .act-open { color: var(--brand-400); }
    .actions .act-wa { color: var(--success); }
    .actions .act-danger { color: var(--danger); }
    .actions .act-danger:hover { background: var(--danger-soft); color: var(--danger); }

    @media (max-width: 640px) {
        .prop-card { grid-template-columns: 1fr; }
        .prop-card .actions { justify-content: flex-start; }
    }
</style>
</head>

<body>

<main class="max-w-6xl mx-auto px-4 sm:px-6 py-6 sm:py-10">
    <header class="page-header">
        <div>
            <h1 class="flex items-center gap-3">
                <i class="fas fa-file-invoice text-grad-brand"></i> Propostas geradas
            </h1>
            <p class="page-subtitle">
                Todas as propostas geradas para seus clientes. Edite, duplique ou compartilhe novamente.
            </p>
        </div>
        <div class="flex items-center gap-2">
            <a href="./Configuracoes-Propostas.html" class="btn btn-secondary">
                <i class="fas fa-sliders"></i> <span class="hidden sm:inline">Templates</span>
            </a>
            <a href="./Equipamentos.html" class="btn btn-primary">
                <i class="fas fa-plus"></i> Nova proposta
            </a>
        </div>
    </header>

    <div class="toolbar">
        <div class="search-wrap">
            <i class="fas fa-search"></i>
            <input id="prop-search" type="text" class="input" placeholder="Buscar por cliente, evento ou slug…" autocomplete="off">
        </div>
        <select id="prop-status-filter" class="select">
            <option value="">Todas</option>
            <option value="draft">Rascunho</option>
            <option value="sent">Enviada (não visualizada)</option>
            <option value="viewed">Visualizada pelo cliente</option>
        </select>
    </div>

    <section id="prop-list" class="space-y-3">
        <div style="text-align:center;color:var(--text-faint);padding:60px 0;">
            <i class="fas fa-spinner fa-spin" style="font-size:1.6rem;margin-bottom:10px;"></i>
            <p>Carregando propostas…</p>
        </div>
    </section>
</main>

<script type="module">
import { api, API_BASE_URL } from './js/api.js';

let allProps = [];

function esc(s) {
    return String(s ?? '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;');
}

function formatBRL(v) {
    if (v == null || isNaN(v)) return '—';
    return Number(v).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
}

function formatDate(iso) {
    if (!iso) return '—';
    try {
        const d = new Date(iso);
        return d.toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    } catch { return '—'; }
}

function statusLabel(s) {
    if (s === 'viewed') return { label: 'Visualizada', cls: 'badge-success', icon: 'eye' };
    if (s === 'sent') return { label: 'Enviada', cls: 'badge-info', icon: 'paper-plane' };
    return { label: 'Rascunho', cls: '', icon: 'pen-to-square' };
}

function renderList() {
    const search = (document.getElementById('prop-search').value || '').toLowerCase().trim();
    const statusFilter = document.getElementById('prop-status-filter').value;

    let filtered = allProps;
    if (statusFilter) filtered = filtered.filter(p => (p.status || 'draft') === statusFilter);
    if (search) {
        filtered = filtered.filter(p =>
            (p.clientName || '').toLowerCase().includes(search) ||
            (p.eventTitle || '').toLowerCase().includes(search) ||
            (p.slug || '').toLowerCase().includes(search)
        );
    }

    const list = document.getElementById('prop-list');
    if (!filtered.length) {
        if (allProps.length === 0) {
            list.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon"><i class="fas fa-file-invoice"></i></div>
                    <div class="empty-title">Nenhuma proposta gerada ainda.</div>
                    <div class="empty-text">Crie a primeira proposta acessando a aba Equipamentos.</div>
                    <a href="./Equipamentos.html" class="btn btn-primary">
                        <i class="fas fa-plus"></i> Gerar primeira proposta
                    </a>
                </div>
            `;
        } else {
            list.innerHTML = `
                <div class="empty-state">
                    <div class="empty-icon"><i class="fas fa-magnifying-glass"></i></div>
                    <div class="empty-text">Nenhuma proposta encontrada com esses filtros.</div>
                </div>
            `;
        }
        return;
    }

    list.innerHTML = filtered.map(p => {
        const st = statusLabel(p.status);
        const url = `${window.location.origin}/p/${p.slug}`;
        const itemCount = (p.items || []).length;
        const totalLine = p.showPrices && p.total != null
            ? `<span><i class="fas fa-tag"></i> ${formatBRL(p.total)}</span>`
            : `<span style="color:var(--text-faint);font-style:italic;"><i class="fas fa-eye-slash"></i> Sem valores</span>`;

        return `
            <article class="prop-card surface surface-hover" data-id="${p.id}">
                <div>
                    <h3 class="head">
                        ${esc(p.clientName || 'Cliente')}
                        <span class="badge ${st.cls}"><i class="fas fa-${st.icon}"></i> ${st.label}</span>
                    </h3>
                    ${p.eventTitle ? `<div class="subhead">${esc(p.eventTitle)}${p.eventDate ? ' · ' + esc(p.eventDate.split('-').reverse().join('/')) : ''}</div>` : ''}
                    <div class="meta-row">
                        <span><i class="fas fa-cubes"></i> ${itemCount} brinquedo${itemCount === 1 ? '' : 's'}</span>
                        ${totalLine}
                        ${p.viewCount > 0 ? `<span><i class="fas fa-eye"></i> ${p.viewCount} visualiza${p.viewCount === 1 ? 'ção' : 'ções'}</span>` : ''}
                        <span title="Criada em ${formatDate(p.createdAt)}"><i class="fas fa-clock"></i> ${formatDate(p.createdAt)}</span>
                    </div>
                    <div class="url-row">
                        <code>${esc(url)}</code>
                        <button data-action="copy" data-url="${esc(url)}" title="Copiar link"><i class="fas fa-copy"></i> Copiar</button>
                    </div>
                </div>
                <div class="actions">
                    <a href="${esc(url)}" target="_blank" rel="noopener" class="btn btn-ghost btn-icon btn-sm act-open" title="Abrir prévia em nova aba">
                        <i class="fas fa-up-right-from-square"></i>
                    </a>
                    <a href="https://wa.me/?text=${encodeURIComponent(`Olá! Segue a proposta da Aero Festas: ${url}`)}" target="_blank" rel="noopener" class="btn btn-ghost btn-icon btn-sm act-wa" title="Compartilhar via WhatsApp">
                        <i class="fab fa-whatsapp"></i>
                    </a>
                    <a href="./Equipamentos.html?edit-proposta=${p.id}" class="btn btn-ghost btn-icon btn-sm" title="Editar proposta">
                        <i class="fas fa-pen"></i>
                    </a>
                    <button class="btn btn-ghost btn-icon btn-sm" data-action="duplicate" title="Duplicar">
                        <i class="fas fa-clone"></i>
                    </button>
                    <button class="btn btn-ghost btn-icon btn-sm act-danger" data-action="delete" title="Excluir">
                        <i class="fas fa-trash"></i>
                    </button>
                </div>
            </article>
        `;
    }).join('');
}

document.getElementById('prop-list').addEventListener('click', async (e) => {
    const btn = e.target.closest('button[data-action]');
    if (!btn) return;
    const card = btn.closest('.prop-card');
    if (!card) return;
    const id = parseFloat(card.dataset.id);
    const proposta = allProps.find(p => p.id === id);
    if (!proposta) return;
    const action = btn.dataset.action;

    if (action === 'copy') {
        const url = btn.dataset.url;
        try {
            await navigator.clipboard.writeText(url);
            UI.toast('Link copiado!', 'success');
        } catch {
            UI.toast('Não foi possível copiar', 'error');
        }
    } else if (action === 'duplicate') {
        btn.disabled = true;
        const res = await api.duplicarProposta(id);
        btn.disabled = false;
        if (res?.success && res.data) {
            UI.toast(`Proposta duplicada (${res.data.slug})`, 'success');
            await loadProps();
        } else {
            UI.toast('Erro ao duplicar proposta', 'error');
        }
    } else if (action === 'delete') {
        if (!confirm(`Excluir a proposta para "${proposta.clientName}"?\n\nIsso apaga a proposta permanentemente. O link ${window.location.origin}/p/${proposta.slug} deixará de funcionar.`)) return;
        btn.disabled = true;
        const ok = await api.deletarProposta(id);
        btn.disabled = false;
        if (ok) {
            UI.toast('Proposta excluída', 'success');
            await loadProps();
        } else {
            UI.toast('Erro ao excluir proposta', 'error');
        }
    }
});

document.getElementById('prop-search').addEventListener('input', renderList);
document.getElementById('prop-status-filter').addEventListener('change', renderList);

async function loadProps() {
    allProps = await api.listarPropostas();
    if (!Array.isArray(allProps)) allProps = [];
    renderList();
}

loadProps();
</script>

<script src="./js/ui.js"></script>
<script src="./js/nav.js"></script>
<script src="js/protect.js"></script>
</body>
</html>
