<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Foto em breve">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff4ec"/>
      <stop offset="1" stop-color="#ffe0d2"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#fff7f1"/>
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.6" fill="#E31837" opacity=".10"/>
    </pattern>
  </defs>

  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#dots)"/>

  <!-- decorative junina pennant strings -->
  <g opacity=".35" fill="none" stroke="#E31837" stroke-width="2">
    <path d="M0 70 Q 200 130 400 70 T 800 70"/>
    <path d="M0 540 Q 200 480 400 540 T 800 540"/>
  </g>
  <g opacity=".55">
    <polygon points="120,65 110,90 130,90" fill="#E31837"/>
    <polygon points="280,95 270,120 290,120" fill="#F5B82E"/>
    <polygon points="440,72 430,97 450,97" fill="#2F8F5E"/>
    <polygon points="600,95 590,120 610,120" fill="#E31837"/>
    <polygon points="120,535 110,560 130,560" fill="#F5B82E"/>
    <polygon points="280,505 270,530 290,530" fill="#2F8F5E"/>
    <polygon points="440,538 430,563 450,563" fill="#E31837"/>
    <polygon points="600,505 590,530 610,530" fill="#F5B82E"/>
  </g>

  <!-- center card -->
  <g transform="translate(400 300)">
    <rect x="-180" y="-110" width="360" height="220" rx="28" fill="url(#card)" stroke="#E31837" stroke-opacity=".25" stroke-width="2"/>

    <!-- camera icon -->
    <g transform="translate(0 -28)" fill="none" stroke="#E31837" stroke-width="4" stroke-linejoin="round" stroke-linecap="round" opacity=".85">
      <path d="M-46 -14 h-14 a8 8 0 0 0 -8 8 v44 a8 8 0 0 0 8 8 h116 a8 8 0 0 0 8 -8 v-44 a8 8 0 0 0 -8 -8 h-14 l-8 -12 h-72 z"/>
      <circle cx="0" cy="16" r="18"/>
      <circle cx="0" cy="16" r="6" fill="#E31837" stroke="none" opacity=".5"/>
    </g>

    <text x="0" y="58" text-anchor="middle" font-family="'Outfit','Inter',system-ui,sans-serif" font-weight="700" font-size="26" fill="#1a1a1a">Foto em breve</text>
    <text x="0" y="86" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-weight="500" font-size="14" fill="#666">Imagem ilustrativa em produção</text>
  </g>
</svg>
