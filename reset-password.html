<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./js/theme.js"></script>
    <title>Definir Nova Senha - Sistema Operante</title>

    <!-- PWA Config -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="js/pwa-init.js"></script>

    <link rel="stylesheet" href="./css/tokens.css">
    <link rel="stylesheet" href="./css/aero.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'], display: ['Outfit','sans-serif'] } } } }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='20' cy='20' r='10' fill='%234f46e5'/><circle cx='80' cy='30' r='8' fill='%234f46e5'/><circle cx='50' cy='70' r='12' fill='%234f46e5'/><line x1='20' y1='20' x2='80' y2='30' stroke='%234f46e5' stroke-width='5'/><line x1='80' y1='30' x2='50' y2='70' stroke='%234f46e5' stroke-width='5'/></svg>">
    <style>
        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        /* ---- Card de autenticação ----
           NOTA: a classe .glassmorphism permanece no card SEM estilos —
           é usada como seletor pelo JS do fluxo de token inválido. */
        .auth-card {
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            padding: 32px;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--grad-brand);
        }

        .auth-logo {
            width: 48px;
            height: 48px;
            margin: 0 auto 16px;
            border-radius: 14px;
            background: var(--grad-brand);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 6px 18px rgba(79, 70, 229, .35);
        }

        .auth-title {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 24px;
            letter-spacing: -.02em;
            color: var(--text);
        }

        .auth-subtitle {
            font-size: 14px;
            color: var(--text-muted);
        }

        .auth-link {
            font-size: 14px;
            font-weight: 600;
            color: var(--brand-600);
            transition: color var(--dur) var(--ease);
        }
        .auth-link:hover { text-decoration: underline; }
        .dark .auth-link { color: var(--brand-400); }

        /* Mensagens de erro/sucesso (cores vêm de .badge-danger/.badge-success) */
        .auth-msg {
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            text-align: center;
        }

        /* ---- Page loader (simplificado) ---- */
        #page-loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--dur-slow) var(--ease), visibility var(--dur-slow);
        }

        #page-loader.visible {
            opacity: 1;
            visibility: visible;
        }

        .loader-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--brand-600);
            border-radius: 50%;
            animation: aero-spin .8s linear infinite;
        }

        @keyframes aero-spin { to { transform: rotate(360deg); } }

        .loader-text {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            text-align: center;
            color: var(--text-muted);
            min-height: 1.5em;
            transition: opacity .5s ease;
        }
    </style>
</head>

<body>
    <!-- Page Loader -->
    <div id="page-loader">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <div id="loader-message" class="loader-text">Segurança Aero</div>
        </div>
    </div>

    <div class="glassmorphism surface-raised auth-card">
        <div class="text-center mb-8">
            <div class="auth-logo"><i class="fa-solid fa-plane-up"></i></div>
            <h1 class="auth-title mb-1">Nova Senha</h1>
            <p class="auth-subtitle">Aero Festas</p>
        </div>

        <form id="resetForm" class="space-y-5">
            <div>
                <label class="input-label">Nova Senha</label>
                <input type="password" id="password" required
                    class="input"
                    placeholder="••••••••">
            </div>

            <div id="msg" class="hidden auth-msg"></div>

            <button type="submit"
                class="btn btn-primary btn-lg btn-full">
                <i class="fas fa-save mr-2"></i>Salvar Senha
            </button>
        </form>
    </div>

    <script>
        // Mensagens do Loader
        const loaderMessages = ["Protegendo sua conta...", "Validando segurança...", "Atualizando senha...", "Quase pronto!"];
        let msgIndex = 0;
        const msgEl = document.getElementById('loader-message');
        setInterval(() => {
            if (!msgEl) return;
            msgEl.style.opacity = '0';
            setTimeout(() => {
                msgIndex = (msgIndex + 1) % loaderMessages.length;
                msgEl.textContent = loaderMessages[msgIndex];
                msgEl.style.opacity = '1';
            }, 500);
        }, 2000);

        const params = new URLSearchParams(window.location.search);
        const token = params.get('token');

        if (!token) {
            document.querySelector('.glassmorphism').innerHTML = '<div class="text-center py-10"><i class="fas fa-exclamation-triangle text-red-500 text-5xl mb-4"></i><h2 class="text-xl font-bold">Link inválido ou expirado.</h2><a href="login.html" class="auth-link block mt-6">Voltar ao Login</a></div>';
        }

        document.getElementById('resetForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('password').value;
            const msg = document.getElementById('msg');
            const loader = document.getElementById('page-loader');
            const submitBtn = e.target.querySelector('button[type="submit"]');

            if (loader) loader.classList.add('visible');
            submitBtn.disabled = true;

            try {
                const res = await fetch('https://backend-aerofestas-production.up.railway.app/api/auth/reset-password', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ token, newPassword })
                });
                const data = await res.json();

                if (loader) loader.classList.remove('visible');

                msg.classList.remove('hidden');
                if (res.ok) {
                    msg.textContent = "Senha alterada com sucesso! Redirecionando...";
                    msg.className = "auth-msg badge-success";
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    msg.textContent = data.error || "Erro ao alterar.";
                    msg.className = "auth-msg badge-danger";
                    submitBtn.disabled = false;
                }
            } catch (err) {
                if (loader) loader.classList.remove('visible');
                msg.classList.remove('hidden');
                msg.textContent = "Erro de conexão.";
                msg.className = "auth-msg badge-danger";
                submitBtn.disabled = false;
            }
        });
    </script>
</body>

</html>
