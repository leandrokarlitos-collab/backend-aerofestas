<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./js/theme.js"></script>
    <title>Login - Sistema Operante</title>

    <!-- PWA Config -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="js/pwa-init.js"></script>

    <link rel="stylesheet" href="./css/tokens.css">
    <link rel="stylesheet" href="./css/aero.css">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter','sans-serif'], display: ['Outfit','sans-serif'] } } } }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='20' cy='20' r='10' fill='%234f46e5'/><circle cx='80' cy='30' r='8' fill='%234f46e5'/><circle cx='50' cy='70' r='12' fill='%234f46e5'/><line x1='20' y1='20' x2='80' y2='30' stroke='%234f46e5' stroke-width='5'/><line x1='80' y1='30' x2='50' y2='70' stroke='%234f46e5' stroke-width='5'/></svg>">
    <style>
        body {
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        /* ---- Card de autenticação ---- */
        .auth-card {
            position: relative;
            overflow: hidden;
            width: 100%;
            max-width: 420px;
            padding: 32px;
        }

        .auth-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: var(--grad-brand);
        }

        .auth-logo {
            width: 48px;
            height: 48px;
            margin: 0 auto 16px;
            border-radius: 14px;
            background: var(--grad-brand);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 6px 18px rgba(79, 70, 229, .35);
        }

        .auth-title {
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 24px;
            letter-spacing: -.02em;
            color: var(--text);
        }

        .auth-subtitle {
            font-size: 14px;
            color: var(--text-muted);
        }

        .auth-link {
            font-size: 14px;
            font-weight: 600;
            color: var(--brand-600);
            transition: color var(--dur) var(--ease);
        }
        .auth-link:hover { text-decoration: underline; }
        .dark .auth-link { color: var(--brand-400); }

        .auth-divider { border-top: 1px solid var(--border); }

        /* Mensagens de erro/sucesso (cores vêm de .badge-danger/.badge-success) */
        .auth-msg {
            padding: 10px 14px;
            border-radius: var(--radius);
            font-size: 14px;
            font-weight: 500;
            text-align: center;
        }

        /* ---- Page loader (simplificado) ---- */
        #page-loader {
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 99999;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--dur-slow) var(--ease), visibility var(--dur-slow);
        }

        #page-loader.visible {
            opacity: 1;
            visibility: visible;
        }

        .loader-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }

        .loader-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border);
            border-top-color: var(--brand-600);
            border-radius: 50%;
            animation: aero-spin .8s linear infinite;
        }

        @keyframes aero-spin { to { transform: rotate(360deg); } }

        .loader-text {
            font-size: 12px;
            font-weight: 600;
            letter-spacing: .08em;
            text-transform: uppercase;
            text-align: center;
            color: var(--text-muted);
            min-height: 1.5em;
            transition: opacity .5s ease;
        }
    </style>
</head>

<body>
    <!-- Page Loader -->
    <div id="page-loader">
        <div class="loader-content">
            <div class="loader-spinner"></div>
            <div id="loader-message" class="loader-text">Validando Acesso</div>
        </div>
    </div>

    <div class="surface-raised auth-card">
        <div class="text-center mb-8">
            <div class="auth-logo"><i class="fa-solid fa-plane-up"></i></div>
            <h1 class="auth-title mb-1">Sistema Operante</h1>
            <p class="auth-subtitle">Aero Festas</p>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="input-label">Email</label>
                <input type="email" id="email" required
                    class="input"
                    placeholder="seu@email.com">
            </div>

            <div>
                <label class="input-label">Senha</label>
                <input type="password" id="password" required
                    class="input"
                    placeholder="••••••••">
                <div class="flex justify-end mt-2">
                    <a href="forgot-password.html" class="auth-link">
                        Esqueci a senha
                    </a>
                </div>
            </div>

            <div id="errorMessage" class="hidden auth-msg badge-danger"></div>
            <div id="successMessage" class="hidden auth-msg badge-success"></div>

            <button type="submit"
                class="btn btn-primary btn-lg btn-full">
                <i class="fas fa-sign-in-alt mr-2"></i>Entrar
            </button>
        </form>

        <div class="auth-divider mt-8 text-center pt-6">
            <a href="register.html" class="auth-link">
                <i class="fas fa-user-plus mr-1"></i>Primeiro acesso? Cadastre-se aqui
            </a>
        </div>
    </div>

    <script>
        // Mensagens do Loader
        const loaderMessages = ["Autenticando...", "Verificando permissões...", "Sincronizando perfil...", "Preparando experiência premium..."];
        let msgIndex = 0;
        const msgEl = document.getElementById('loader-message');
        setInterval(() => {
            if (!msgEl) return;
            msgEl.style.opacity = '0';
            setTimeout(() => {
                msgIndex = (msgIndex + 1) % loaderMessages.length;
                msgEl.textContent = loaderMessages[msgIndex];
                msgEl.style.opacity = '1';
            }, 500);
        }, 2000);
    </script>

    <script type="module">
        import { login, isAuthenticated } from './js/auth.js';

        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        // Verifica se já está logado
        if (typeof isAuthenticated === 'function' && isAuthenticated()) {
            const redirectUrl = sessionStorage.getItem('redirectAfterLogin') || 'Dashboard.html';
            sessionStorage.removeItem('redirectAfterLogin');
            window.location.href = redirectUrl;
        }

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const submitBtn = loginForm.querySelector('button[type="submit"]');
            const loader = document.getElementById('page-loader');

            // Limpa mensagens
            errorMessage.classList.add('hidden');
            successMessage.classList.add('hidden');

            // Exibe Loader AAA
            if (loader) loader.classList.add('visible');

            // Desabilita botão
            submitBtn.disabled = true;
            submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Entrando...';

            try {
                // Tenta fazer login usando a função importada do auth.js
                // Se der erro de importação, o catch vai pegar
                if (typeof login !== 'function') {
                    throw new Error("Erro no script de autenticação. Recarregue a página.");
                }

                await login(email, password);

                // Sucesso
                if (loader) {
                    const msgEl = document.getElementById('loader-message');
                    if (msgEl) msgEl.textContent = "Acesso Autorizado!";
                }

                successMessage.textContent = 'Login realizado com sucesso! Redirecionando...';
                successMessage.classList.remove('hidden');

                // Redireciona
                setTimeout(() => {
                    const redirectUrl = sessionStorage.getItem('redirectAfterLogin') || 'Dashboard.html'; // Mudado para Dashboard como padrão
                    sessionStorage.removeItem('redirectAfterLogin');
                    window.location.href = redirectUrl;
                }, 1000);
            } catch (error) {
                // Esconde Loader em caso de erro
                if (loader) loader.classList.remove('visible');

                errorMessage.textContent = error.message || 'Erro ao fazer login';
                errorMessage.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.innerHTML = '<i class="fas fa-sign-in-alt mr-2"></i>Entrar';
            }
        });
    </script>
</body>

</html>
