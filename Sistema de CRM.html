<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="./js/theme.js"></script>
    <title>Clientes · Aero Festas</title>

    <!-- PWA Config -->
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="icon" href="./icons/Logo_Aero_Festas.png" type="image/png">
    <script src="js/pwa-init.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Outfit', 'sans-serif'] } } } };
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/tokens.css">
    <link rel="stylesheet" href="./css/aero.css">

    <style>
        /* ---- CRM: mínimos específicos da página (somente tokens do DS) ---- */
        .is-closed { display: none !important; }

        /* Barra de ferramentas */
        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            margin-bottom: 16px;
        }
        .toolbar .select { width: auto; }
        .search-wrap { position: relative; flex: 1; min-width: 180px; max-width: 340px; }
        .search-wrap > i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-faint);
            pointer-events: none;
        }
        .search-wrap .input { padding-left: 38px; }

        /* Banner de importação one-time */
        .import-banner {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            margin-bottom: 16px;
            border-left: 4px solid var(--brand-500);
        }
        .import-banner .ib-icon {
            width: 40px;
            height: 40px;
            flex: none;
            border-radius: 999px;
            background: var(--brand-50);
            color: var(--brand-600);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .dark .import-banner .ib-icon { color: var(--brand-400); }
        .import-banner .ib-text { flex: 1; min-width: 200px; }
        .import-banner .ib-title { font-weight: 700; font-size: 14px; color: var(--text); }
        .import-banner .ib-sub { font-size: 12.5px; color: var(--text-muted); margin-top: 2px; }
        .import-banner .ib-actions { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }

        /* Grade lista + detalhe */
        .crm-grid { display: grid; grid-template-columns: 1fr; gap: 16px; align-items: start; }
        @media (min-width: 1024px) {
            .crm-grid.has-detail { grid-template-columns: 380px minmax(0, 1fr); }
        }
        @media (max-width: 1023.98px) {
            .crm-grid.has-detail #client-list-container { display: none; }
        }

        .list-panel { padding: 0; overflow: hidden; }
        .list-scroll { max-height: 68vh; overflow-y: auto; }
        .count-text { font-size: 12.5px; color: var(--text-faint); padding: 10px 16px; margin: 0; }

        /* Linhas da lista */
        .client-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr);
            gap: 4px 10px;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: background-color var(--dur) var(--ease);
        }
        .client-row:hover { background: var(--surface-2); }
        .client-row.active { background: var(--brand-50); }
        .client-row .cr-nome {
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }
        .client-row .cr-nome > span:first-child { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .client-row .cr-sub {
            font-size: 12.5px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 3px;
        }
        .client-row .cr-col { font-size: 13px; color: var(--text-muted); display: none; min-width: 0; }
        @media (min-width: 768px) {
            .client-row { grid-template-columns: minmax(0, 2fr) minmax(0, 1.1fr) 150px 110px; }
            .client-row .cr-col { display: block; }
            .client-row .cr-sub .sub-tel { display: none; }
            .client-row .cr-sub .sub-fup { display: none; }
        }
        .client-row.head {
            cursor: default;
            background: transparent !important;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--text-muted);
            padding-top: 14px;
            padding-bottom: 10px;
            display: none;
        }
        @media (min-width: 768px) { .client-row.head { display: grid; } }

        /* Funil (kanban somente-leitura) */
        .funnel-board { display: flex; gap: 12px; overflow-x: auto; padding: 16px; align-items: flex-start; }
        .funnel-col {
            flex: 0 0 235px;
            background: var(--surface-inset);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px;
        }
        .funnel-col-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin: 2px 4px 10px;
            font-size: 11.5px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--text-muted);
        }
        .funnel-col-head .fc-count {
            font-size: 11px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 1px 8px;
            color: var(--text-muted);
        }
        .funnel-card {
            background: var(--surface-1);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            box-shadow: var(--shadow-1);
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: border-color var(--dur) var(--ease), transform var(--dur) var(--ease);
        }
        .funnel-card:hover { border-color: var(--brand-400); transform: translateY(-1px); }
        .funnel-card .fc-nome { font-weight: 600; font-size: 13.5px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .funnel-card .fc-tel { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        .funnel-card .fc-valor { font-size: 12.5px; font-weight: 700; color: var(--success); margin-top: 4px; font-variant-numeric: tabular-nums; }
        .funnel-col.lost .funnel-col-head { color: var(--danger); cursor: pointer; user-select: none; }
        .funnel-col.lost.collapsed { flex-basis: 180px; }
        .funnel-col.lost.collapsed .funnel-col-body { display: none; }
        .funnel-empty { font-size: 12px; color: var(--text-faint); text-align: center; padding: 10px 4px; }

        /* Painel de detalhe */
        .detail-panel { padding: 20px; }
        @media (min-width: 1024px) {
            .detail-panel { position: sticky; top: 16px; max-height: calc(100vh - 32px); overflow-y: auto; }
        }
        .d-head { display: flex; align-items: center; gap: 14px; min-width: 0; flex: 1; }
        .d-avatar {
            width: 56px;
            height: 56px;
            flex: none;
            border-radius: 999px;
            background: var(--grad-brand);
            color: var(--text-on-brand);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--font-display);
            font-weight: 700;
            font-size: 18px;
        }
        .d-nome { font-family: var(--font-display); font-weight: 700; font-size: 20px; color: var(--text); overflow-wrap: anywhere; }
        .d-sub { font-size: 13px; color: var(--text-muted); margin-top: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
        .d-actions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 14px; }

        /* Stepper da jornada */
        .journey { display: flex; gap: 4px; margin-top: 6px; }
        .journey-step {
            flex: 1;
            min-width: 0;
            text-align: center;
            font-size: 10.5px;
            font-weight: 700;
            color: var(--text-faint);
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 7px 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: background-color var(--dur) var(--ease), color var(--dur) var(--ease);
        }
        .journey-step.done { background: var(--brand-50); border-color: transparent; color: var(--brand-600); }
        .dark .journey-step.done { color: var(--brand-400); }
        .journey-step.current { background: var(--grad-brand); border-color: transparent; color: var(--text-on-brand); box-shadow: var(--shadow-1); }

        /* Seções do detalhe */
        .d-sec { margin-top: 20px; padding-top: 18px; border-top: 1px solid var(--border); }
        .d-sec > h3 {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--text-muted);
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .d-sec > h3 i { color: var(--brand-600); }
        .dark .d-sec > h3 i { color: var(--brand-400); }

        .detail-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(170px, 1fr)); gap: 10px 16px; }
        .detail-item .dt {
            font-size: 10.5px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: .05em;
            color: var(--text-faint);
            margin-bottom: 2px;
        }
        .detail-item .dd { font-size: 14px; color: var(--text); overflow-wrap: anywhere; }

        /* Composer (nota + follow-up) */
        .composer {
            background: var(--surface-inset);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px;
            margin-bottom: 14px;
        }
        .composer .cp-row { display: flex; gap: 8px; align-items: flex-end; flex-wrap: wrap; }
        .composer .cp-row > .grow { flex: 1; min-width: 160px; }

        /* Timeline */
        .tl-item { display: flex; gap: 12px; padding: 12px 2px; border-bottom: 1px solid var(--border); }
        .tl-item:last-child { border-bottom: none; }
        .tl-icon {
            width: 34px;
            height: 34px;
            flex: none;
            border-radius: 999px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
        }
        .tl-icon.nota { background: var(--brand-50); color: var(--brand-600); }
        .dark .tl-icon.nota { color: var(--brand-400); }
        .tl-icon.fup { background: var(--warning-soft); color: var(--warning); }
        .tl-icon.fup-done { background: var(--success-soft); color: var(--success); }
        .tl-icon.evento { background: var(--info-soft); color: var(--info); }
        .tl-body { flex: 1; min-width: 0; }
        .tl-meta { font-size: 11.5px; color: var(--text-faint); display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .tl-text { font-size: 13.5px; color: var(--text); margin-top: 3px; white-space: pre-wrap; overflow-wrap: anywhere; }
        .tl-text.done { color: var(--text-faint); text-decoration: line-through; }
        .tl-del {
            margin-left: auto;
            border: none;
            background: transparent;
            color: var(--text-faint);
            width: 28px;
            height: 28px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            flex: none;
            transition: background-color var(--dur) var(--ease), color var(--dur) var(--ease);
        }
        .tl-del:hover { background: var(--danger-soft); color: var(--danger); }
        .fup-check { width: 17px; height: 17px; accent-color: var(--brand-600); cursor: pointer; margin-top: 2px; flex: none; }

        /* Formulário do modal */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .fg-full { grid-column: 1 / -1; }
        @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }
        .modal-box.modal-wide { max-width: 640px; }

        /* Saída da IA e relatório de importação */
        .ai-out {
            white-space: pre-wrap;
            font-size: 14px;
            color: var(--text);
            background: var(--surface-inset);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px;
            max-height: 56vh;
            overflow-y: auto;
        }
        .report-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 12px; }
        .report-cell {
            background: var(--surface-inset);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 10px 12px;
            text-align: center;
        }
        .report-cell .rc-num { font-family: var(--font-display); font-weight: 700; font-size: 20px; color: var(--text); }
        .report-cell .rc-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: .04em; font-weight: 600; }
    </style>
</head>

<body data-page="clientes">

<main class="max-w-7xl mx-auto px-4 sm:px-6 py-6 sm:py-10">

    <header class="page-header">
        <div>
            <h1 class="flex items-center gap-3"><i class="fas fa-users text-grad-brand"></i> Clientes</h1>
            <p class="page-subtitle">Jornada do cliente, follow-ups e histórico — direto da nuvem</p>
        </div>
        <div class="flex items-center gap-2 flex-wrap">
            <button id="add-client-btn" class="btn btn-primary" type="button">
                <i class="fas fa-plus"></i> Novo cliente
            </button>
        </div>
    </header>

    <!-- Banner one-time: dados locais do navegador → nuvem -->
    <div id="import-banner" class="surface import-banner hidden">
        <div class="ib-icon"><i class="fas fa-cloud-arrow-up"></i></div>
        <div class="ib-text">
            <div class="ib-title" id="import-banner-title">Encontramos dados locais neste navegador</div>
            <div class="ib-sub">Analise (sem gravar nada) ou importe para a nuvem — nada é sobrescrito nem apagado.</div>
        </div>
        <div class="ib-actions">
            <button id="import-dry-btn" class="btn btn-secondary btn-sm" type="button"><i class="fas fa-magnifying-glass-chart"></i> Analisar (dry-run)</button>
            <button id="import-run-btn" class="btn btn-primary btn-sm" type="button"><i class="fas fa-cloud-arrow-up"></i> Importar para a nuvem</button>
            <button id="import-hide-btn" class="btn btn-ghost btn-icon" type="button" title="Ocultar por enquanto"><i class="fas fa-xmark"></i></button>
        </div>
    </div>

    <div class="toolbar">
        <div class="segmented" id="view-toggle">
            <button type="button" data-view="lista"><i class="fas fa-list mr-1"></i> Lista</button>
            <button type="button" data-view="funil"><i class="fas fa-diagram-project mr-1"></i> Funil</button>
        </div>
        <div class="search-wrap">
            <i class="fas fa-search"></i>
            <input type="text" id="search-bar" class="input" placeholder="Buscar por nome ou telefone…" autocomplete="off">
        </div>
        <select id="stage-filter" class="select" title="Estágio"></select>
        <select id="sort-select" class="select" title="Ordenação">
            <option value="nome">Nome A-Z</option>
            <option value="followup">Follow-up mais próximo</option>
            <option value="evento">Próximo evento</option>
            <option value="contato">Último contato</option>
        </select>
    </div>

    <div class="crm-grid" id="crm-grid">

        <section id="client-list-container" class="surface list-panel">
            <div id="list-view">
                <div class="client-row head" id="client-list-header">
                    <div>Cliente</div>
                    <div class="cr-col">Telefone</div>
                    <div class="cr-col">Follow-up</div>
                    <div class="cr-col">Próx. evento</div>
                </div>
                <div id="client-list" class="list-scroll"></div>
            </div>
            <div id="funnel-view" class="hidden">
                <div id="funnel-board" class="funnel-board"></div>
            </div>
            <p id="client-count" class="count-text"></p>
        </section>

        <section id="main-content" class="surface detail-panel hidden">
            <div id="detail-view"></div>
        </section>

    </div>

</main>

<!-- Modal: adicionar/editar cliente -->
<div id="modal-overlay" class="modal-backdrop sheet-on-mobile is-closed">
    <div class="modal-box modal-wide">
        <div class="modal-header">
            <div class="modal-title" id="form-title">Cliente</div>
            <button type="button" class="btn btn-ghost btn-icon" data-close="modal-overlay" aria-label="Fechar"><i class="fas fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <form id="client-form" class="form-grid">
                <input type="hidden" id="client-id">
                <div class="fg-full">
                    <label class="input-label" for="nome">Nome completo *</label>
                    <input type="text" id="nome" class="input" required autocomplete="off">
                </div>
                <div>
                    <label class="input-label" for="telefone">Telefone</label>
                    <input type="tel" id="telefone" class="input" placeholder="(62) 9 9999-9999">
                </div>
                <div>
                    <label class="input-label" for="email">Email</label>
                    <input type="email" id="email" class="input">
                </div>
                <div>
                    <label class="input-label" for="instagram">Instagram</label>
                    <input type="text" id="instagram" class="input" placeholder="@perfil">
                </div>
                <div>
                    <label class="input-label" for="dataNascimento">Nascimento</label>
                    <input type="date" id="dataNascimento" class="input">
                </div>
                <div class="fg-full">
                    <label class="input-label" for="enderecoResidencial">Endereço</label>
                    <input type="text" id="enderecoResidencial" class="input">
                </div>
                <div>
                    <label class="input-label" for="cpf">CPF</label>
                    <input type="text" id="cpf" class="input">
                </div>
                <div>
                    <label class="input-label" for="origem">Origem do lead</label>
                    <input type="text" id="origem" class="input" placeholder="Instagram, indicação…">
                </div>
                <div>
                    <label class="input-label" for="estagio">Estágio da jornada</label>
                    <select id="estagio" class="select"></select>
                </div>
                <div>
                    <label class="input-label" for="tags-input">Tags (separadas por vírgula)</label>
                    <input type="text" id="tags-input" class="input" placeholder="Recorrente, PJ…">
                </div>
            </form>
        </div>
        <div class="modal-footer">
            <button type="button" id="cancel-btn" class="btn btn-ghost" data-close="modal-overlay">Cancelar</button>
            <button type="submit" form="client-form" id="save-client-btn" class="btn btn-primary"><i class="fas fa-check"></i> Salvar cliente</button>
        </div>
    </div>
</div>

<!-- Modal: assistente IA -->
<div id="gemini-modal" class="modal-backdrop is-closed">
    <div class="modal-box modal-wide">
        <div class="modal-header">
            <div class="modal-title" id="gemini-modal-title">Assistente IA</div>
            <button type="button" id="gemini-close-btn" class="btn btn-ghost btn-icon" data-close="gemini-modal" aria-label="Fechar"><i class="fas fa-xmark"></i></button>
        </div>
        <div class="modal-body" id="gemini-modal-content"></div>
        <div class="modal-footer" id="gemini-modal-footer">
            <button type="button" id="gemini-copy-btn" class="btn btn-secondary"><i class="fas fa-copy"></i> Copiar</button>
        </div>
    </div>
</div>

<script type="module">
import { api } from './js/api.js';

/* ================= Helpers ================= */
const $ = (id) => document.getElementById(id);

function escapeHtml(str) {
    return String(str == null ? '' : str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
const fmtBRL = (v) => (Number(v) || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
function fmtData(iso) {
    // Sempre escapado: datas vêm como String livre do banco/localStorage
    if (!iso) return '—';
    const s = String(iso).split('T')[0];
    const [y, m, d] = s.split('-');
    if (!d) return escapeHtml(String(iso));
    return escapeHtml(`${d}/${m}/${y}`);
}
function fmtDataHora(iso) {
    if (!iso) return '—';
    const dt = new Date(iso);
    if (isNaN(dt.getTime())) return fmtData(iso);
    return escapeHtml(dt.toLocaleDateString('pt-BR') + ' ' + dt.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' }));
}
function hojeISO() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function addDiasISO(baseIso, dias) {
    const d = new Date(baseIso + 'T00:00:00');
    d.setDate(d.getDate() + dias);
    return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
}
function iniciais(nome) {
    return String(nome || '?').trim().split(/\s+/).map(p => p[0]).slice(0, 2).join('').toUpperCase();
}
const soDigitos = (s) => String(s || '').replace(/\D/g, '');
const ult8 = (s) => { const d = soDigitos(s); return d.length >= 8 ? d.slice(-8) : ''; };
const normNome = (s) => String(s || '').trim().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g, '');
const DASH = '<span style="color:var(--text-faint);">—</span>';

/* ================= Estágios (contrato v3) ================= */
const STAGE_ORDER = ['novo', 'contato', 'proposta', 'negociacao', 'fechado', 'pos_venda'];
const STAGES = {
    novo:       { label: 'Novo',            curto: 'Novo',      badge: 'badge' },
    contato:    { label: 'Em contato',      curto: 'Contato',   badge: 'badge badge-info' },
    proposta:   { label: 'Proposta',        curto: 'Proposta',  badge: 'badge badge-brand' },
    negociacao: { label: 'Negociação',      curto: 'Negoc.',    badge: 'badge badge-warning' },
    fechado:    { label: 'Fechado (ganho)', curto: 'Fechado',   badge: 'badge badge-success' },
    pos_venda:  { label: 'Pós-venda',       curto: 'Pós-venda', badge: 'badge badge-info' },
    perdido:    { label: 'Perdido',         curto: 'Perdido',   badge: 'badge badge-danger' }
};
// CRM legado usava estágios numéricos (7 era um pós-venda antigo, migrado p/ 6)
const LEGACY_STAGE_MAP = { 1: 'novo', 2: 'contato', 3: 'proposta', 4: 'negociacao', 5: 'fechado', 6: 'pos_venda', 7: 'pos_venda', 99: 'perdido' };
function normStage(v) {
    if (v == null || v === '') return 'novo';
    if (STAGES[v]) return v;
    return LEGACY_STAGE_MAP[Number(v)] || 'novo';
}
function stageBadge(stage) {
    const s = STAGES[normStage(stage)];
    return `<span class="${s.badge}">${escapeHtml(s.curto)}</span>`;
}

function parseTags(raw) {
    if (!raw) return [];
    if (Array.isArray(raw)) return raw.filter(Boolean).map(String);
    try {
        const arr = JSON.parse(raw);
        return Array.isArray(arr) ? arr.filter(Boolean).map(String) : [];
    } catch {
        return String(raw).split(',').map(t => t.trim()).filter(Boolean);
    }
}

// API → shape interno (nomes pt usados pelos renderizadores)
function normalizeClient(c) {
    return {
        id: Number(c.id),
        nome: c.name || '',
        telefone: c.phone || '',
        endereco: c.address || '',
        cpf: c.cpf || '',
        email: c.email || '',
        instagram: c.instagram || '',
        birthday: c.birthday || '',
        stage: normStage(c.stage),
        source: c.source || '',
        tags: parseTags(c.tags),
        lastContactAt: c.lastContactAt || null
    };
}

/* ================= Estado ================= */
const state = {
    clients: [],
    events: [],
    eventsByClient: new Map(),   // id → eventos (desc por data)
    pendingByClient: new Map(),  // id → follow-ups pendentes (asc por dueDate)
    currentId: null,
    detail: null,                // { client, notes, followUps }
    detailPending: null,
    view: 'lista',
    carregado: false
};

/* ================= Modais estáticos ================= */
document.querySelectorAll('[data-close]').forEach(btn => {
    btn.addEventListener('click', () => $(btn.getAttribute('data-close')).classList.add('is-closed'));
});
document.querySelectorAll('.modal-backdrop[id]').forEach(bd => {
    bd.addEventListener('mousedown', (e) => { if (e.target === bd) bd.classList.add('is-closed'); });
});

/* ================= Índices (eventos e follow-ups) ================= */
function buildEventIndex() {
    state.eventsByClient = new Map();
    const evs = state.events.map(ev => ({
        ev,
        phones: [ev.clientPhone, ev.clientPhoneBackup, ev.repPhone, ev.repPhoneBackup].map(ult8).filter(Boolean),
        nome: normNome(ev.clientName)
    }));
    state.clients.forEach(c => {
        const p8 = ult8(c.telefone);
        const nm = normNome(c.nome);
        const lista = evs
            .filter(x => (p8 && x.phones.indexOf(p8) !== -1) || (nm && x.nome === nm))
            .map(x => x.ev);
        lista.sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')));
        if (lista.length) state.eventsByClient.set(c.id, lista);
    });
}
function buildPendingIndex(pendentes) {
    state.pendingByClient = new Map();
    (pendentes || []).forEach(f => {
        const cid = Number(f.clientId);
        if (!state.pendingByClient.has(cid)) state.pendingByClient.set(cid, []);
        state.pendingByClient.get(cid).push(f);
    });
    state.pendingByClient.forEach(l => l.sort((a, b) => String(a.dueDate).localeCompare(String(b.dueDate))));
}
const eventosDo = (id) => state.eventsByClient.get(Number(id)) || [];
function proximoEvento(id) {
    const hoje = hojeISO();
    const fut = eventosDo(id).filter(e => String(e.date || '') >= hoje);
    return fut.length ? fut[fut.length - 1] : null; // lista está desc → futuro mais próximo é o último
}
const pendentesDo = (id) => state.pendingByClient.get(Number(id)) || [];
const proximoFollowUp = (id) => pendentesDo(id)[0] || null;

function fupChipHtml(f) {
    if (!f) return DASH;
    const hoje = hojeISO();
    let cls = 'badge';
    let icone = 'fa-clock';
    if (String(f.dueDate) < hoje) { cls = 'badge badge-danger'; icone = 'fa-triangle-exclamation'; }
    else if (String(f.dueDate) <= addDiasISO(hoje, 7)) { cls = 'badge badge-warning'; }
    return `<span class="${cls}" title="${escapeHtml(f.note || '')}"><i class="fas ${icone}"></i> ${fmtData(f.dueDate)}</span>`;
}

/* ================= Carga (API-first, sem merge com localStorage) ================= */
async function loadData() {
    if (!state.carregado) UI.skeleton($('client-list'), 'table', 6);
    const [clientes, eventos, pendentes] = await Promise.all([
        api.getClientes(),
        api.getEventos(),
        api.getFollowUpsPendentes()
    ]);
    state.clients = (clientes || []).map(normalizeClient);
    state.events = eventos || [];
    buildEventIndex();
    buildPendingIndex(pendentes);
    state.carregado = true;
    render();
}

/* ================= Filtro / ordenação ================= */
function filtrados() {
    const q = ($('search-bar').value || '').toLowerCase().trim();
    const qDig = soDigitos(q);
    const st = $('stage-filter').value;
    const ord = $('sort-select').value;
    let lista = [...state.clients];
    if (q) {
        lista = lista.filter(c =>
            c.nome.toLowerCase().includes(q) ||
            (qDig && soDigitos(c.telefone).includes(qDig)));
    }
    if (st) lista = lista.filter(c => c.stage === st);
    const cmpNome = (a, b) => a.nome.localeCompare(b.nome, 'pt-BR');
    if (ord === 'followup') {
        lista.sort((a, b) => {
            const fa = proximoFollowUp(a.id), fb = proximoFollowUp(b.id);
            if (fa && fb) return String(fa.dueDate).localeCompare(String(fb.dueDate)) || cmpNome(a, b);
            if (fa) return -1;
            if (fb) return 1;
            return cmpNome(a, b);
        });
    } else if (ord === 'evento') {
        lista.sort((a, b) => {
            const ea = proximoEvento(a.id), eb = proximoEvento(b.id);
            if (ea && eb) return String(ea.date).localeCompare(String(eb.date)) || cmpNome(a, b);
            if (ea) return -1;
            if (eb) return 1;
            return cmpNome(a, b);
        });
    } else if (ord === 'contato') {
        lista.sort((a, b) => String(b.lastContactAt || '').localeCompare(String(a.lastContactAt || '')) || cmpNome(a, b));
    } else {
        lista.sort(cmpNome);
    }
    return lista;
}

/* ================= Render: lista ================= */
function render() {
    if (state.view === 'funil') renderFunnel(); else renderList();
}

function renderList() {
    const el = $('client-list');
    const lista = filtrados();
    $('client-count').textContent = lista.length ? `${lista.length} ${lista.length === 1 ? 'cliente' : 'clientes'}` : '';
    if (!lista.length) {
        if (!state.clients.length) {
            UI.empty(el, {
                icon: 'fa-users',
                title: 'Nenhum cliente na nuvem',
                text: 'Cadastre o primeiro cliente ou importe os dados locais deste navegador.',
                cta: { label: 'Novo cliente', onClick: () => abrirForm(null) }
            });
        } else {
            UI.empty(el, {
                icon: 'fa-magnifying-glass',
                title: 'Nenhum cliente encontrado',
                text: 'Ajuste a busca ou o filtro de estágio.'
            });
        }
        return;
    }
    el.innerHTML = lista.map(c => {
        const fup = proximoFollowUp(c.id);
        const ev = proximoEvento(c.id);
        const ativo = c.id === state.currentId;
        return `
        <div class="client-row${ativo ? ' active' : ''}" data-id="${c.id}" id="client-list-item-${c.id}">
            <div class="min-w-0">
                <div class="cr-nome"><span>${escapeHtml(c.nome)}</span> ${stageBadge(c.stage)}</div>
                <div class="cr-sub">
                    <span class="sub-tel">${escapeHtml(c.telefone || 'Sem telefone')}</span>
                    <span class="sub-fup">${fup ? fupChipHtml(fup) : ''}</span>
                    ${c.tags.slice(0, 3).map(t => `<span class="badge">${escapeHtml(t)}</span>`).join('')}
                </div>
            </div>
            <div class="cr-col" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${escapeHtml(c.telefone || '') || DASH}</div>
            <div class="cr-col">${fupChipHtml(fup)}</div>
            <div class="cr-col tabular-nums">${ev ? fmtData(ev.date) : DASH}</div>
        </div>`;
    }).join('');
}

/* ================= Render: funil (kanban somente-leitura) ================= */
function renderFunnel() {
    const board = $('funnel-board');
    const lista = filtrados();
    $('client-count').textContent = lista.length ? `${lista.length} ${lista.length === 1 ? 'cliente' : 'clientes'}` : '';
    if (!state.clients.length) {
        UI.empty(board, {
            icon: 'fa-users',
            title: 'Nenhum cliente na nuvem',
            text: 'Cadastre o primeiro cliente ou importe os dados locais deste navegador.',
            cta: { label: 'Novo cliente', onClick: () => abrirForm(null) }
        });
        const node = board.firstElementChild;
        if (node) node.style.flex = '1';
        return;
    }
    const porStage = {};
    STAGE_ORDER.concat(['perdido']).forEach(s => { porStage[s] = []; });
    lista.forEach(c => porStage[normStage(c.stage)].push(c));

    const cardHtml = (c) => {
        const ev = proximoEvento(c.id);
        const valor = ev && ev.price ? `<div class="fc-valor tabular-nums">${escapeHtml(fmtBRL(ev.price))}</div>` : '';
        return `<div class="funnel-card" data-id="${c.id}">
            <div class="fc-nome">${escapeHtml(c.nome)}</div>
            <div class="fc-tel">${escapeHtml(c.telefone || 'Sem telefone')}</div>
            ${valor}
        </div>`;
    };

    let html = STAGE_ORDER.map(s => `
        <div class="funnel-col">
            <div class="funnel-col-head"><span>${escapeHtml(STAGES[s].label)}</span><span class="fc-count">${porStage[s].length}</span></div>
            <div class="funnel-col-body">${porStage[s].map(cardHtml).join('') || '<div class="funnel-empty">Vazio</div>'}</div>
        </div>`).join('');
    html += `
        <div class="funnel-col lost collapsed">
            <div class="funnel-col-head" title="Mostrar/ocultar perdidos"><span><i class="fas fa-heart-crack"></i> Perdidos</span><span class="fc-count">${porStage.perdido.length}</span></div>
            <div class="funnel-col-body">${porStage.perdido.map(cardHtml).join('') || '<div class="funnel-empty">Nenhum perdido</div>'}</div>
        </div>`;
    board.innerHTML = html;
}

$('client-list').addEventListener('click', (e) => {
    const row = e.target.closest('.client-row[data-id]');
    if (row) showClientDetails(Number(row.dataset.id));
});
$('funnel-board').addEventListener('click', (e) => {
    const head = e.target.closest('.funnel-col.lost .funnel-col-head');
    if (head) { head.parentElement.classList.toggle('collapsed'); return; }
    const card = e.target.closest('.funnel-card[data-id]');
    if (card) showClientDetails(Number(card.dataset.id));
});

/* ================= Alternância Lista | Funil ================= */
function setView(v) {
    if (v !== 'lista' && v !== 'funil') v = 'lista';
    state.view = v;
    try { localStorage.setItem('crm_view', v); } catch { /* storage indisponível */ }
    document.querySelectorAll('#view-toggle > button').forEach(b => b.classList.toggle('active', b.dataset.view === v));
    $('list-view').classList.toggle('hidden', v !== 'lista');
    $('funnel-view').classList.toggle('hidden', v !== 'funil');
    $('sort-select').classList.toggle('hidden', v !== 'lista');
    if (state.carregado) render();
}
document.querySelectorAll('#view-toggle > button').forEach(b => {
    b.addEventListener('click', () => setView(b.dataset.view));
});

/* ================= Detalhe do cliente ================= */
async function showClientDetails(id) {
    id = Number(id);
    state.currentId = id;
    $('crm-grid').classList.add('has-detail');
    $('main-content').classList.remove('hidden');
    render(); // destaca a linha ativa
    const dv = $('detail-view');
    UI.skeleton(dv, 'lines', 8);
    state.detailPending = id; // guarda contra resposta obsoleta
    const data = await api.getClienteById(id);
    if (state.detailPending !== id) return;
    if (!data || data.error) {
        UI.empty(dv, { icon: 'fa-user-slash', title: 'Não foi possível carregar', text: 'Verifique a conexão e tente novamente.' });
        return;
    }
    state.detail = {
        client: normalizeClient(data),
        notes: Array.isArray(data.notes) ? data.notes : [],
        followUps: Array.isArray(data.followUps) ? data.followUps : []
    };
    renderDetail();
}

function closeDetail() {
    state.currentId = null;
    state.detail = null;
    state.detailPending = null;
    $('crm-grid').classList.remove('has-detail');
    $('main-content').classList.add('hidden');
    render();
}

async function recarregarDetalhe() {
    const id = state.currentId;
    if (!id) return;
    state.detailPending = id;
    const data = await api.getClienteById(id);
    if (state.detailPending !== id || !data || data.error) return;
    state.detail = {
        client: normalizeClient(data),
        notes: Array.isArray(data.notes) ? data.notes : [],
        followUps: Array.isArray(data.followUps) ? data.followUps : []
    };
    sincronizarPendentes();
    renderDetail();
    render();
}

function sincronizarPendentes() {
    const d = state.detail;
    if (!d) return;
    const id = d.client.id;
    const pend = d.followUps
        .filter(f => !f.done)
        .map(f => ({ id: f.id, dueDate: f.dueDate, note: f.note, clientId: id }))
        .sort((a, b) => String(a.dueDate).localeCompare(String(b.dueDate)));
    if (pend.length) state.pendingByClient.set(id, pend);
    else state.pendingByClient.delete(id);
}

function buildTimelineHtml() {
    const d = state.detail;
    const c = d.client;
    const items = [];
    d.notes.forEach(n => items.push({ ts: String(n.createdAt || ''), tipo: 'nota', n }));
    d.followUps.forEach(f => items.push({ ts: String(f.dueDate || '') + 'T23:59:59', tipo: 'fup', f }));
    eventosDo(c.id).forEach(ev => items.push({ ts: String(ev.date || '') + 'T' + String(ev.startTime || '12:00'), tipo: 'evento', ev }));
    if (!items.length) {
        return '<div class="empty-state" style="padding:24px;"><div class="empty-icon"><i class="fas fa-feather"></i></div>' +
            '<div class="empty-title">Sem histórico ainda</div>' +
            '<div class="empty-text">Adicione a primeira nota ou agende um follow-up acima.</div></div>';
    }
    items.sort((a, b) => b.ts.localeCompare(a.ts));
    const hoje = hojeISO();
    return items.map(it => {
        if (it.tipo === 'nota') {
            const n = it.n;
            return `
            <div class="tl-item">
                <div class="tl-icon nota"><i class="fas fa-note-sticky"></i></div>
                <div class="tl-body">
                    <div class="tl-meta"><span>Nota</span><span>·</span><span>${fmtDataHora(n.createdAt)}</span>${n.createdBy ? `<span>·</span><span>${escapeHtml(n.createdBy)}</span>` : ''}</div>
                    <div class="tl-text">${escapeHtml(n.text)}</div>
                </div>
                <button type="button" class="tl-del" data-note-id="${escapeHtml(n.id)}" title="Excluir nota"><i class="fas fa-trash-can"></i></button>
            </div>`;
        }
        if (it.tipo === 'fup') {
            const f = it.f;
            const atrasado = !f.done && String(f.dueDate) < hoje;
            return `
            <div class="tl-item">
                <div class="tl-icon ${f.done ? 'fup-done' : 'fup'}"><i class="fas ${f.done ? 'fa-check' : 'fa-bell'}"></i></div>
                <div class="tl-body">
                    <div class="tl-meta">
                        <span>Follow-up</span><span>·</span><span>${fmtData(f.dueDate)}</span>
                        ${atrasado ? '<span class="badge badge-danger">Vencido</span>' : ''}
                        ${f.done && f.doneAt ? `<span>· concluído em ${fmtDataHora(f.doneAt)}</span>` : ''}
                    </div>
                    <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;margin-top:4px;">
                        <input type="checkbox" class="fup-check" data-fup-id="${escapeHtml(f.id)}" ${f.done ? 'checked' : ''}>
                        <span class="tl-text${f.done ? ' done' : ''}" style="margin-top:0;">${escapeHtml(f.note || 'Follow-up')}</span>
                    </label>
                </div>
            </div>`;
        }
        const ev = it.ev;
        const passado = String(ev.date || '') < hoje;
        const brinquedos = (ev.items || []).map(i => i.toy && i.toy.name).filter(Boolean);
        const endereco = ev.clientAddress || ev.contractAddress || '';
        return `
        <div class="tl-item">
            <div class="tl-icon evento"><i class="fas fa-calendar-day"></i></div>
            <div class="tl-body">
                <div class="tl-meta">
                    <span>Evento</span><span>·</span><span>${fmtData(ev.date)}${ev.startTime ? ' ' + escapeHtml(ev.startTime) : ''}</span>
                    <span class="badge ${passado ? '' : 'badge-info'}">${passado ? 'Realizado' : 'Agendado'}</span>
                    ${ev.price ? `<span class="badge badge-success tabular-nums">${escapeHtml(fmtBRL(ev.price))}</span>` : ''}
                </div>
                <div class="tl-text">${escapeHtml(endereco)}${brinquedos.length ? (endereco ? '\n' : '') + escapeHtml('Itens: ' + brinquedos.join(', ')) : ''}</div>
            </div>
        </div>`;
    }).join('');
}

function renderDetail() {
    const d = state.detail;
    if (!d) return;
    const c = d.client;
    const stage = normStage(c.stage);
    const perdido = stage === 'perdido';
    const idxAtual = STAGE_ORDER.indexOf(stage);

    const steps = STAGE_ORDER.map((s, i) => {
        let cls = 'journey-step';
        if (!perdido && i < idxAtual) cls += ' done';
        if (!perdido && i === idxAtual) cls += ' current';
        return `<div class="${cls}" data-stage="${s}" title="${escapeHtml(STAGES[s].label)}">${escapeHtml(STAGES[s].curto)}</div>`;
    }).join('');

    const stageOptions = STAGE_ORDER.concat(['perdido']).map(s =>
        `<option value="${s}"${s === stage ? ' selected' : ''}>${escapeHtml(STAGES[s].label)}</option>`).join('');

    const dados = [
        ['Telefone', c.telefone ? escapeHtml(c.telefone) : ''],
        ['Email', c.email ? escapeHtml(c.email) : ''],
        ['Instagram', c.instagram ? escapeHtml(c.instagram) : ''],
        ['CPF', c.cpf ? escapeHtml(c.cpf) : ''],
        ['Nascimento', c.birthday ? fmtData(c.birthday) : ''],
        ['Origem do lead', c.source ? escapeHtml(c.source) : ''],
        ['Último contato', c.lastContactAt ? fmtDataHora(c.lastContactAt) : ''],

    $('detail-view').innerHTML = `
        <div class="flex items-start justify-between gap-3">
            <div class="d-head">
                <div class="d-avatar">${escapeHtml(iniciais(c.nome))}</div>
                <div class="min-w-0">
                    <div class="d-nome">${escapeHtml(c.nome)}</div>
                    <div class="d-sub">${stageBadge(stage)}${c.tags.map(t => `<span class="chip" style="padding:2px 9px;font-size:11px;">${escapeHtml(t)}</span>`).join('')}</div>
                </div>
            </div>
            <button type="button" id="close-detail-view-btn" class="btn btn-ghost btn-icon" title="Fechar detalhes"><i class="fas fa-xmark"></i></button>
        </div>

        <div class="d-actions">
            <button type="button" id="edit-client-btn" class="btn btn-secondary btn-sm"><i class="fas fa-pen"></i> Editar</button>
            <button type="button" id="whatsapp-btn" class="btn btn-secondary btn-sm"><i class="fab fa-whatsapp" style="color:var(--success);"></i> WhatsApp</button>
            <button type="button" id="gemini-summary-btn" class="btn btn-secondary btn-sm"><i class="fas fa-wand-magic-sparkles"></i> Resumir cliente</button>
            <button type="button" id="gemini-relationship-btn" class="btn btn-secondary btn-sm"><i class="fas fa-comment-dots"></i> Gerar mensagens</button>
            <button type="button" id="delete-client-btn" class="btn btn-danger-soft btn-sm"><i class="fas fa-trash"></i> Excluir</button>
        </div>

        <div class="d-sec">
            <h3><i class="fas fa-route"></i> Jornada do cliente</h3>
            <div id="visual-funnel">
                <div class="journey">${steps}</div>
                <div id="funnel-loss-indicator" class="${perdido ? '' : 'hidden'}" style="margin-top:8px;">
                    <span class="badge badge-danger"><i class="fas fa-heart-crack"></i> Locação perdida</span>
                </div>
            </div>
            <div style="margin-top:12px;max-width:280px;">
                <label class="input-label" for="detail-estagio">Estágio atual</label>
                <select id="detail-estagio" class="select">${stageOptions}</select>
            </div>
        </div>

        <div class="d-sec">
            <h3><i class="fas fa-address-card"></i> Dados do cliente</h3>
            <div class="detail-grid">${dados}</div>
        </div>

        <div class="d-sec">
            <h3><i class="fas fa-clock-rotate-left"></i> Linha do tempo</h3>
            <div class="composer">
                <div class="cp-row">
                    <div class="grow">
                        <label class="input-label" for="note-text">Nova nota</label>
                        <textarea id="note-text" class="textarea" rows="2" placeholder="Registre o contato, combinados, observações…"></textarea>
                    </div>
                    <button type="button" id="add-note-btn" class="btn btn-primary btn-sm"><i class="fas fa-plus"></i> Nota</button>
                </div>
                <div class="cp-row" style="margin-top:10px;">
                    <div>
                        <label class="input-label" for="fup-date">Follow-up</label>
                        <input type="date" id="fup-date" class="input">
                    </div>
                    <div class="grow">
                        <label class="input-label" for="fup-note">O que fazer?</label>
                        <input type="text" id="fup-note" class="input" placeholder="Ex.: retornar sobre a proposta">
                    </div>
                    <button type="button" id="add-fup-btn" class="btn btn-secondary btn-sm"><i class="fas fa-bell"></i> Agendar</button>
                </div>
            </div>
            <div id="tl-list">${buildTimelineHtml()}</div>
        </div>
    `;
    wireDetail();
}

function wireDetail() {
    const d = state.detail;
    const c = d.client;
    const id = c.id;

    $('close-detail-view-btn').addEventListener('click', closeDetail);
    $('edit-client-btn').addEventListener('click', () => abrirForm(c));

    $('whatsapp-btn').addEventListener('click', () => {
        let tel = soDigitos(c.telefone);
        if (!tel) { UI.toast('Cliente sem telefone cadastrado', 'error'); return; }
        if (tel.length <= 11) tel = '55' + tel;
        window.open(`https://wa.me/${tel}`, '_blank');
    });

    $('gemini-summary-btn').addEventListener('click', () => analisarIA('resumo'));
    $('gemini-relationship-btn').addEventListener('click', () => analisarIA('mensagens'));

    $('delete-client-btn').addEventListener('click', async () => {
        const ok = await UI.confirm({
            title: 'Excluir cliente',
            message: `Excluir "${c.nome}" e todo o histórico (notas e follow-ups)? Esta ação não pode ser desfeita.`,
            confirmText: 'Excluir',
            danger: true
        });
        if (!ok) return;
        const res = await api.deletarCliente(id);
        if (!res) { UI.toast('Erro ao excluir cliente', 'error'); return; }
        state.clients = state.clients.filter(x => x.id !== id);
        state.pendingByClient.delete(id);
        state.eventsByClient.delete(id);
        closeDetail();
        UI.toast('Cliente excluído');
    });

    $('detail-estagio').addEventListener('change', async (e) => {
        const novo = e.target.value;
        const anterior = c.stage;
        e.target.disabled = true;
        const res = await api.atualizarCliente(id, { stage: novo });
        e.target.disabled = false;
        if (!res) {
            e.target.value = anterior;
            UI.toast('Erro ao atualizar estágio', 'error');
            return;
        }
        c.stage = novo;
        const emLista = state.clients.find(x => x.id === id);
        if (emLista) emLista.stage = novo;
        renderDetail();
        render();
        UI.toast('Estágio atualizado');
    });

    $('add-note-btn').addEventListener('click', async () => {
        const texto = ($('note-text').value || '').trim();
        if (!texto) { UI.toast('Escreva a nota antes de salvar', 'error'); return; }
        const btn = $('add-note-btn');
        btn.disabled = true;
        const res = await api.criarNotaCliente(id, texto);
        btn.disabled = false;
        if (!res) { UI.toast('Erro ao salvar nota', 'error'); return; }
        // marca o último contato (não bloqueia a UI)
        const agora = new Date().toISOString();
        api.atualizarCliente(id, { lastContactAt: agora });
        c.lastContactAt = agora;
        const emLista = state.clients.find(x => x.id === id);
        if (emLista) emLista.lastContactAt = agora;
        UI.toast('Nota adicionada');
        await recarregarDetalhe();
    });

    $('add-fup-btn').addEventListener('click', async () => {
        const dueDate = $('fup-date').value;
        const note = ($('fup-note').value || '').trim();
        if (!dueDate) { UI.toast('Escolha a data do follow-up', 'error'); return; }
        const btn = $('add-fup-btn');
        btn.disabled = true;
        const res = await api.criarFollowUpCliente(id, dueDate, note);
        btn.disabled = false;
        if (!res) { UI.toast('Erro ao agendar follow-up', 'error'); return; }
        UI.toast('Follow-up agendado');
        await recarregarDetalhe();
    });

    document.querySelectorAll('#tl-list .tl-del').forEach(btn => {
        btn.addEventListener('click', async () => {
            const ok = await UI.confirm({ title: 'Excluir nota', message: 'Excluir esta nota do histórico?', confirmText: 'Excluir', danger: true });
            if (!ok) return;
            const feito = await api.deletarNotaCliente(btn.dataset.noteId);
            if (!feito) { UI.toast('Erro ao excluir nota', 'error'); return; }
            UI.toast('Nota excluída');
            await recarregarDetalhe();
        });
    });

    document.querySelectorAll('#tl-list .fup-check').forEach(chk => {
        chk.addEventListener('change', async () => {
            const fupId = chk.dataset.fupId;
            const done = chk.checked;
            chk.disabled = true;
            const res = await api.atualizarFollowUpCliente(fupId, done);
            chk.disabled = false;
            if (!res) {
                chk.checked = !done;
                UI.toast('Erro ao atualizar follow-up', 'error');
                return;
            }
            const f = d.followUps.find(x => x.id === fupId);
            if (f) { f.done = done; f.doneAt = done ? new Date().toISOString() : null; }
            sincronizarPendentes();
            renderDetail();
            render();
        });
    });
}

/* ================= Formulário (modal) ================= */
function preencherSelectsEstagios() {
    const opts = STAGE_ORDER.concat(['perdido']).map(s => `<option value="${s}">${escapeHtml(STAGES[s].label)}</option>`).join('');
    $('estagio').innerHTML = opts;
    $('stage-filter').innerHTML = '<option value="">Estágio: todos</option>' + opts;
}

function abrirForm(c) {
    $('form-title').textContent = c ? 'Editar cliente' : 'Novo cliente';
    $('client-id').value = c ? c.id : '';
    $('nome').value = c ? c.nome : '';
    $('telefone').value = c ? c.telefone : '';
    $('email').value = c ? c.email : '';
    $('instagram').value = c ? c.instagram : '';
    $('dataNascimento').value = c ? (c.birthday || '') : '';
    $('enderecoResidencial').value = c ? c.endereco : '';
    $('cpf').value = c ? c.cpf : '';
    $('origem').value = c ? c.source : '';
    $('estagio').value = c ? normStage(c.stage) : 'novo';
    $('tags-input').value = c ? c.tags.join(', ') : '';
    $('modal-overlay').classList.remove('is-closed');
    setTimeout(() => $('nome').focus(), 60);
}

$('client-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const nome = ($('nome').value || '').trim();
    if (!nome) { UI.toast('Informe o nome do cliente', 'error'); return; }
    const tagsArr = ($('tags-input').value || '').split(',').map(t => t.trim()).filter(Boolean);
    const payload = {
        name: nome,
        phone: ($('telefone').value || '').trim() || null,
        address: ($('enderecoResidencial').value || '').trim() || null,
        cpf: ($('cpf').value || '').trim() || null,
        email: ($('email').value || '').trim() || null,
        instagram: ($('instagram').value || '').trim() || null,
        birthday: $('dataNascimento').value || null,
        source: ($('origem').value || '').trim() || null,
        stage: $('estagio').value,
        tags: JSON.stringify(tagsArr)
    };
    const idVal = $('client-id').value;
    const btn = $('save-client-btn');
    btn.disabled = true;
    let alvoId = null;
    if (idVal) {
        const res = await api.atualizarCliente(idVal, payload);
        if (!res) { btn.disabled = false; UI.toast('Erro ao salvar cliente', 'error'); return; }
        alvoId = Number(idVal);
    } else {
        // POST cria com os campos básicos; os ricos vão em seguida via PATCH parcial
        const criado = await api.criarCliente({ name: payload.name, phone: payload.phone, address: payload.address, cpf: payload.cpf });
        const novoId = criado && criado.data && criado.data.id;
        if (!novoId) { btn.disabled = false; UI.toast('Erro ao criar cliente', 'error'); return; }
        const resRicos = await api.atualizarCliente(novoId, {
            email: payload.email,
            instagram: payload.instagram,
            birthday: payload.birthday,
            source: payload.source,
            stage: payload.stage,
            tags: payload.tags
        });
        if (!resRicos) {
            UI.toast('Cliente criado, mas alguns campos não foram salvos — abra e salve de novo', 'warning');
        }
        alvoId = Number(novoId);
    }
    btn.disabled = false;
    $('modal-overlay').classList.add('is-closed');
    UI.toast(idVal ? 'Cliente atualizado' : 'Cliente criado');
    await loadData();
    showClientDetails(alvoId);
});

/* ================= Análise com IA (backend /admin/ai/analyze-client) ================= */
function payloadIA() {
    const d = state.detail;
    const c = d.client;
    return {
        nome: c.nome,
        telefone: c.telefone,
        email: c.email,
        instagram: c.instagram,
        nascimento: c.birthday,
        estagio: STAGES[normStage(c.stage)].label,
        origem: c.source,
        tags: c.tags,
        ultimoContato: c.lastContactAt,
        notas: d.notes.map(n => ({ texto: n.text, data: n.createdAt })),
        followUps: d.followUps.map(f => ({ data: f.dueDate, nota: f.note, concluido: !!f.done })),
        eventos: eventosDo(c.id).map(ev => ({
            data: ev.date,
            valor: ev.price || null,
            itens: (ev.items || []).map(i => i.toy && i.toy.name).filter(Boolean)
        }))
    };
}

async function analisarIA(mode) {
    if (!state.detail) return;
    const c = state.detail.client;
    $('gemini-modal-title').textContent = mode === 'resumo' ? `Resumo de ${c.nome}` : `Mensagens para ${c.nome}`;
    UI.skeleton($('gemini-modal-content'), 'lines', 5);
    $('gemini-modal-footer').classList.add('hidden');
    $('gemini-modal').classList.remove('is-closed');
    const res = await api.analisarClienteIA({ client: payloadIA(), mode });
    if (!res || !res.ok || !res.text) {
        const msg = (res && res.error) || 'Não foi possível gerar a análise. Tente novamente.';
        $('gemini-modal-content').innerHTML = `<div class="ai-out" style="color:var(--danger);">${escapeHtml(msg)}</div>`;
        UI.toast(msg, 'error');
        return;
    }
    $('gemini-modal-content').innerHTML = `<div class="ai-out" id="ai-out-text">${escapeHtml(res.text)}</div>`;
    $('gemini-modal-footer').classList.remove('hidden');
}

$('gemini-copy-btn').addEventListener('click', async () => {
    const el = document.getElementById('ai-out-text');
    if (!el) return;
    const texto = el.innerText;
    let ok = false;
    try { await navigator.clipboard.writeText(texto); ok = true; }
    catch {
        const ta = document.createElement('textarea');
        ta.value = texto;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try { ok = document.execCommand('copy'); } catch { /* noop */ }
        ta.remove();
    }
    UI.toast(ok ? 'Copiado!' : 'Falha ao copiar', ok ? 'success' : 'error');
});

/* ================= Importação one-time (localStorage → nuvem) ================= */
// 'crmToyClients_v8' NUNCA é apagado — é apenas a fonte do import.
function lerLocaisV8() {
    try {
        const arr = JSON.parse(localStorage.getItem('crmToyClients_v8') || '[]');
        return Array.isArray(arr) ? arr : [];
    } catch { return []; }
}

// Shape local v8 → item do contrato /import-local
function mapearLocaisParaImport(locais) {
    return locais.filter(c => c && (c.nome || c.name)).map(c => {
        const item = { name: String(c.nome || c.name).trim() };
        const idNum = Number(c.id);
        if (c.id != null && !isNaN(idNum)) item.id = idNum;
        if (c.telefone || c.phone) item.phone = String(c.telefone || c.phone);
        if (c.email) item.email = String(c.email);
        if (c.instagram) item.instagram = String(c.instagram);
        if (c.dataNascimento) item.birthday = String(c.dataNascimento);
        item.stage = normStage(c.estagio); // numérico legado → string do contrato
        if (c.origem) item.source = String(c.origem);

        // Campos legados sem coluna própria viram tags
        const tags = [];
        if (c.company) tags.push(String(c.company));
        if (c.tipoEvento) tags.push(String(c.tipoEvento));
        if (c.isRecorrente) tags.push('Recorrente');
        if (c.clientType === 'PJ') tags.push('PJ');
        if (tags.length) item.tags = JSON.stringify(tags);

        // Anotações + histórico de conversas → notes[]
        const notes = [];
        if (c.anotacoes && String(c.anotacoes).trim()) notes.push({ text: String(c.anotacoes).trim() });
        (Array.isArray(c.conversationHistory) ? c.conversationHistory : []).forEach(h => {
            if (!h || !h.description) return;
            const n = { text: String(h.description) };
            if (h.date) n.createdAt = `${h.date}T${h.time || '00:00'}:00`;
            notes.push(n);
        });
        // Dados de jornada específicos do estágio (sem coluna própria) → 1 nota resumo
        const jornada = [];
        if (c.eventDate) jornada.push('Data prevista: ' + c.eventDate);
        if (c.eventLocation) jornada.push('Local: ' + c.eventLocation);
        if (c.desiredToys) jornada.push('Brinquedos desejados: ' + c.desiredToys);
        if (c.estimatedValue) jornada.push('Valor estimado: ' + fmtBRL(c.estimatedValue));
        if (c.dataNegociacao) jornada.push('Data de negociação: ' + c.dataNegociacao);
        if (c.lossReason) jornada.push('Motivo da perda: ' + c.lossReason);
        if (c.fotoUrl) jornada.push('(cliente tinha foto local — não importada)');
        if (jornada.length) notes.push({ text: '[Jornada — dados locais] ' + jornada.join(' · ') });
        // Feedbacks de eventos fechados (os eventos em si já vivem na Agenda/API)
        (Array.isArray(c.historicoEventosFechados) ? c.historicoEventosFechados : []).forEach(ev => {
            if (!ev) return;
            const partes = [];
            if (ev.nomeAniversariante) {
                partes.push('Aniversariante: ' + ev.nomeAniversariante +
                    (ev.nascimentoAniversariante ? ` (nasc. ${ev.nascimentoAniversariante})` : ''));
            }
            if (ev.feedbackCliente) partes.push('Feedback: ' + ev.feedbackCliente);
            if (partes.length) {
                notes.push({ text: `[Evento de ${ev.dataEvento || 'data não informada'}] ${partes.join(' · ')}` });
            }
        });
        // Cadastro extra local (cpf/endereço/telefone reserva/rg) que difere do banco → nota
        const noBanco = state.clients.find(b => b.id === idNum);
        const extras = [];
        if (c.cpf && (!noBanco || (noBanco.cpf || '') !== c.cpf)) extras.push('CPF: ' + c.cpf);
        if (c.enderecoResidencial && (!noBanco || (noBanco.endereco || '') !== c.enderecoResidencial)) extras.push('Endereço: ' + c.enderecoResidencial);
        if (c.telefoneReserva) extras.push('Telefone reserva: ' + c.telefoneReserva);
        if (c.rg) extras.push('RG: ' + c.rg);
        if (extras.length) notes.push({ text: '[Cadastro local] ' + extras.join(' · ') });
        if (notes.length) item.notes = notes;

        // Follow-up único do legado → followUps[]
        if (c.followUpDate) {
            item.followUps = [{ dueDate: String(c.followUpDate), note: String(c.followUpNotes || ''), done: false }];
        }
        return item;
    });
}

function configurarBannerImport() {
    const locais = lerLocaisV8();
    let done = null;
    try { done = localStorage.getItem('crm_import_done_v1'); } catch { /* noop */ }
    if (!locais.length || done) return;
    $('import-banner-title').textContent =
        `Encontramos ${locais.length} ${locais.length === 1 ? 'cliente' : 'clientes'} com dados locais neste navegador`;
    $('import-banner').classList.remove('hidden');
    $('import-hide-btn').addEventListener('click', () => $('import-banner').classList.add('hidden'));
    $('import-dry-btn').addEventListener('click', () => executarImport(true));
    $('import-run-btn').addEventListener('click', () => executarImport(false));
}

async function executarImport(dryRun) {
    const botoes = [$('import-dry-btn'), $('import-run-btn')];
    botoes.forEach(b => { b.disabled = true; });
    const items = mapearLocaisParaImport(lerLocaisV8());
    if (!items.length) {
        botoes.forEach(b => { b.disabled = false; });
        UI.toast('Nenhum cliente local com nome para importar', 'error');
        return;
    }
    const res = await api.importarClientesLocais(items, dryRun);
    botoes.forEach(b => { b.disabled = false; });
    if (!res || !res.ok) {
        UI.toast((res && res.error) || 'Erro ao importar. Nada foi gravado.', 'error');
        return; // erro → NÃO seta a flag
    }
    mostrarRelatorioImport(res, dryRun);
    if (!dryRun) {
        try { localStorage.setItem('crm_import_done_v1', '1'); } catch { /* noop */ }
        $('import-banner').classList.add('hidden');
        await loadData();
        UI.toast('Importação concluída');
    }
}

function mostrarRelatorioImport(rel, dryRun) {
    const cel = (num, label) =>
        `<div class="report-cell"><div class="rc-num">${Number(num) || 0}</div><div class="rc-label">${label}</div></div>`;
    let html = '';
    if (dryRun) html += '<p style="margin-bottom:10px;"><span class="badge badge-info"><i class="fas fa-flask"></i> Simulação — nada foi gravado</span></p>';
    html += '<div class="report-grid">' +
        cel(rel.matched, 'Casados') +
        cel(rel.created, dryRun ? 'A criar' : 'Criados') +
        cel(rel.fieldsFilled, 'Campos preenchidos') +
        cel(rel.notesCreated, 'Notas') +
        cel(rel.followUpsCreated, 'Follow-ups') +
        cel(rel.skipped, 'Ignorados') +
        '</div>';
    const conflitos = Array.isArray(rel.conflicts) ? rel.conflicts : [];
    if (conflitos.length) {
        html += `<p style="font-weight:600;color:var(--text);margin:6px 0 8px;"><i class="fas fa-triangle-exclamation" style="color:var(--warning);"></i> ${conflitos.length} conflito(s) — o valor do banco foi mantido:</p>`;
        html += '<div class="table-wrap" style="max-height:220px;overflow-y:auto;"><table class="table"><thead><tr><th>Cliente</th><th>Campo</th><th>Banco</th><th>Local</th></tr></thead><tbody>';
        conflitos.forEach(cf => {
            html += `<tr><td>${escapeHtml(cf.name)}</td><td>${escapeHtml(cf.campo)}</td><td>${escapeHtml(cf.banco)}</td><td>${escapeHtml(cf.local)}</td></tr>`;
        });
        html += '</tbody></table></div>';
    } else {
        html += '<p style="font-size:13px;color:var(--text-muted);">Nenhum conflito encontrado.</p>';
    }
    const m = UI.modal({
        title: dryRun ? 'Análise da importação (dry-run)' : 'Importação concluída',
        html,
        footerHtml: dryRun
            ? '<button type="button" class="btn btn-ghost" data-aero-close>Fechar</button><button type="button" class="btn btn-primary" id="report-import-btn"><i class="fas fa-cloud-arrow-up"></i> Importar para a nuvem</button>'
            : '<button type="button" class="btn btn-primary" data-aero-close>Fechar</button>'
    });
    const go = m.box.querySelector('#report-import-btn');
    if (go) go.addEventListener('click', () => { m.close(); executarImport(false); });
}

/* ================= Parâmetros de URL (links de outras páginas) ================= */
function tratarParametrosURL() {
    const params = new URLSearchParams(window.location.search);
    const cid = params.get('clientId');
    if (cid) {
        const id = Number(cid);
        if (state.clients.some(c => c.id === id)) {
            showClientDetails(id);
            setTimeout(() => {
                const el = document.getElementById(`client-list-item-${id}`);
                if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }, 150);
        }
        window.history.replaceState({}, document.title, window.location.pathname);
    }
}
