<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4f46e5">
    <title>App do Monitor — Aero Festas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            background: linear-gradient(160deg, #eef2ff 0%, #f8fafc 45%, #e0e7ff 100%);
            color: #0f172a;
        }
        .card {
            width: 100%;
            max-width: 440px;
            background: rgba(255, 255, 255, .85);
            border: 1px solid rgba(255, 255, 255, .6);
            border-radius: 28px;
            padding: 36px 28px;
            box-shadow: 0 20px 50px rgba(79, 70, 229, .12);
            text-align: center;
        }
        .logo {
            width: 64px; height: 64px;
            border-radius: 20px;
            background: #4f46e5;
            color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px;
            margin: 0 auto 18px;
            box-shadow: 0 10px 24px rgba(79, 70, 229, .35);
        }
        h1 { font-size: 24px; font-weight: 800; }
        .status {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 12px;
            padding: 6px 14px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 700;
            background: #ecfdf5;
            color: #047857;
            border: 1px solid #a7f3d0;
        }
        .status::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: #10b981; }
        .aviso {
            margin-top: 24px;
            padding: 16px;
            border-radius: 16px;
            background: #eef2ff;
            border: 1px solid #c7d2fe;
            color: #4338ca;
            font-size: 14px;
            line-height: 1.55;
        }
        .sair {
            width: 100%;
            margin-top: 28px;
            padding: 14px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            color: #b91c1c;
            background: #fef2f2;
            border: 1px solid #fecaca;
            border-radius: 14px;
            cursor: pointer;
            transition: background .15s;
        }
        .sair:hover { background: #fee2e2; }
        .rodape { margin-top: 20px; font-size: 12px; color: #94a3b8; }
    </style>
</head>

<body>
    <main class="card">
        <div class="logo">🎈</div>
        <h1 id="saudacao">Olá! 👋</h1>
        <span class="status">Acesso ativo</span>

        <div class="aviso">
            Bem-vindo ao app do monitor da <b>Aero Festas</b>.<br>
            As funções de <b>ponto, escala e gastos</b> chegam nas próximas atualizações.
        </div>

        <button type="button" class="sair" onclick="monitorLogout()">Sair</button>
        <p class="rodape">Aero Festas Entertainment</p>
    </main>

    <script>
        document.addEventListener('monitor:ready', (e) => {
            const nome = (e.detail && e.detail.nome) ? e.detail.nome.split(' ')[0] : '';
            if (nome) document.getElementById('saudacao').textContent = `Olá, ${nome}! 👋`;
        });
    </script>
    <!-- Guard do app do monitor (valida a sessão; carregado por último) -->
    <script src="../js/monitor-protect.js"></script>
</body>

</html>
