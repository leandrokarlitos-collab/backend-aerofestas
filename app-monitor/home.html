<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#4f46e5">
    <title>App do Monitor — Aero Festas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            min-height: 100vh;
            padding: 20px 16px 40px;
            background: linear-gradient(160deg, #eef2ff 0%, #f8fafc 45%, #e0e7ff 100%);
            color: #0f172a;
        }
        .wrap { width: 100%; max-width: 480px; margin: 0 auto; }
        .top { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
        .logo {
            width: 48px; height: 48px; border-radius: 14px; background: #4f46e5; color: #fff;
            display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0;
            box-shadow: 0 8px 20px rgba(79, 70, 229, .3);
        }
        h1 { font-size: 20px; font-weight: 800; line-height: 1.2; }
        .sub { font-size: 13px; color: #64748b; }
        .card {
            background: rgba(255, 255, 255, .9); border: 1px solid rgba(255, 255, 255, .7);
            border-radius: 20px; padding: 18px; margin-bottom: 16px;
            box-shadow: 0 12px 30px rgba(79, 70, 229, .08);
        }
        /* Toggle disponibilidade */
        .disp { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .disp-txt strong { display: block; font-size: 15px; font-weight: 700; }
        .disp-txt span { font-size: 12.5px; color: #64748b; }
        .switch { position: relative; width: 58px; height: 32px; flex-shrink: 0; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; inset: 0; cursor: pointer; background: #cbd5e1;
            border-radius: 999px; transition: .2s;
        }
        .slider::before {
            content: ''; position: absolute; height: 24px; width: 24px; left: 4px; top: 4px;
            background: #fff; border-radius: 50%; transition: .2s; box-shadow: 0 2px 6px rgba(0,0,0,.2);
        }
        .switch input:checked + .slider { background: #10b981; }
        .switch input:checked + .slider::before { transform: translateX(26px); }
        .switch input:disabled + .slider { opacity: .5; cursor: wait; }
        .sec-title { font-size: 13px; font-weight: 700; color: #475569; text-transform: uppercase; letter-spacing: .04em; margin: 4px 4px 10px; }
        .evento {
            background: rgba(255, 255, 255, .9); border: 1px solid #e2e8f0;
            border-radius: 16px; padding: 15px; margin-bottom: 12px;
        }
        .ev-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 8px; }
        .ev-data { font-size: 15px; font-weight: 800; color: #4338ca; }
        .badge-mot {
            font-size: 11px; font-weight: 700; color: #b45309; background: #fef3c7;
            border: 1px solid #fde68a; border-radius: 999px; padding: 3px 9px; white-space: nowrap;
        }
        .ev-titulo { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
        .ev-galpao { font-size: 15px; color: #0f172a; background: #eef2ff; border: 1px solid #c7d2fe; border-radius: 12px; padding: 10px 12px; margin: 2px 0 4px; }
        .ev-galpao b { color: #4338ca; }
        .ev-galpao-tbd { color: #94a3b8; background: #f8fafc; border-color: #e2e8f0; font-size: 13.5px; }
        .btn-cheguei { width: 100%; margin-top: 8px; padding: 11px; font-size: 14px; font-weight: 700; font-family: inherit; color: #047857; background: #ecfdf5; border: 1px solid #a7f3d0; border-radius: 12px; cursor: pointer; }
        .btn-cheguei:active { background: #d1fae5; }
        .destino { margin-top: 8px; padding-top: 8px; border-top: 1px dashed #e2e8f0; }
        .ev-linha { font-size: 13px; color: #475569; margin-bottom: 3px; }
        .ev-maps {
            display: inline-flex; align-items: center; gap: 6px; margin-top: 8px;
            font-size: 13px; font-weight: 700; color: #4f46e5; text-decoration: none;
            background: #eef2ff; border: 1px solid #c7d2fe; border-radius: 10px; padding: 7px 12px;
        }
        .vazio { text-align: center; color: #94a3b8; font-size: 14px; padding: 26px 10px; }
        .sair {
            width: 100%; margin-top: 12px; padding: 14px; font-size: 15px; font-weight: 700;
            font-family: inherit; color: #b91c1c; background: #fef2f2; border: 1px solid #fecaca;
            border-radius: 14px; cursor: pointer;
        }
        .rodape { margin-top: 18px; text-align: center; font-size: 12px; color: #94a3b8; }
    </style>
</head>

<body>
    <main class="wrap">
        <div class="top">
            <div class="logo">🎈</div>
            <div>
                <h1 id="saudacao">Olá! 👋</h1>
                <div class="sub">App do Monitor · Aero Festas</div>
            </div>
        </div>

        <!-- Disponibilidade -->
        <div class="card">
            <div class="disp">
                <div class="disp-txt">
                    <strong>Disponível para diária</strong>
                    <span id="disp-legenda">Avise que está disponível para trabalhar</span>
                </div>
                <label class="switch">
                    <input type="checkbox" id="disp-toggle" disabled>
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <!-- Meus eventos -->
        <div class="sec-title">Meus próximos eventos</div>
        <div id="eventos-lista">
            <div class="vazio" id="eventos-loading">Carregando sua escala…</div>
        </div>

        <button type="button" class="sair" onclick="monitorLogout()">Sair</button>
        <p class="rodape">Aero Festas Entertainment</p>
    </main>

    <script>
        const API_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
            ? 'http://localhost:3000/api'
            : 'https://backend-aerofestas-production.up.railway.app/api';

        function monitorToken() { return localStorage.getItem('monitorToken'); }

        function fmtData(iso) {
            if (!iso) return '';
            const [a, m, d] = iso.split('-');
            return d && m ? `${d}/${m}` : iso;
        }
        function fmtIntervalo(ev) {
            const ini = ev.startTime || '';
            const fim = ev.endTime ? `–${ev.endTime}` : '';
            return (ini || fim) ? `${ini}${fim}` : 'Horário a confirmar';
        }
        function escapeHtml(s) {
            return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
        }

        async function carregarEventos() {
            const box = document.getElementById('eventos-lista');
            try {
                const res = await fetch(`${API_BASE}/monitor/events`, {
                    headers: { 'Authorization': `Bearer ${monitorToken()}` }
                });
                if (!res.ok) throw new Error('http ' + res.status);
                const data = await res.json();

                // Sincroniza o toggle de disponibilidade
                const tog = document.getElementById('disp-toggle');
                tog.checked = !!data.disponivelAgora;
                tog.disabled = false;
                atualizarLegendaDisp(tog.checked);

                const eventos = data.eventos || [];
                if (!eventos.length) {
                    box.innerHTML = `<div class="vazio">Você não tem eventos escalados no momento.</div>`;
                    return;
                }
                box.innerHTML = eventos.map((ev, i) => {
                    const galpao = ev.horaChegadaGalpao
                        ? `<div class="ev-galpao">🏭 Chegar no galpão às <b>${escapeHtml(ev.horaChegadaGalpao)}</b></div>`
                        : `<div class="ev-galpao ev-galpao-tbd">🏭 Horário de chegada no galpão a definir</div>`;
                    // Destino: SÓ para o motorista, revelado ao marcar "Cheguei no galpão".
                    let destino = '';
                    if (ev.souMotorista) {
                        destino = `
                            <button type="button" class="btn-cheguei" data-i="${i}">✅ Cheguei no galpão — ver destino</button>
                            <div class="destino" id="destino-${i}" style="display:none;">
                                ${ev.titulo ? `<div class="ev-linha">🎉 ${escapeHtml(ev.titulo)}</div>` : ''}
                                <div class="ev-linha">🕒 Evento: ${escapeHtml(fmtIntervalo(ev))}</div>
                                ${ev.endereco ? `<div class="ev-linha">📍 ${escapeHtml(ev.endereco)}</div>` : ''}
                                ${ev.mapsUrl ? `<a class="ev-maps" href="${ev.mapsUrl}" target="_blank" rel="noopener">🗺️ Abrir no mapa</a>` : ''}
                            </div>`;
                    }
                    return `
                    <div class="evento">
                        <div class="ev-head">
                            <span class="ev-data">📅 ${fmtData(ev.date)}${ev.endDate && ev.endDate !== ev.date ? ' → ' + fmtData(ev.endDate) : ''}</span>
                            ${ev.souMotorista ? '<span class="badge-mot">🚗 Você é o motorista</span>' : ''}
                        </div>
                        ${galpao}
                        ${destino}
                    </div>`;
                }).join('');
                // "Cheguei no galpão" revela o destino (versão simples; F3 vira ponto c/ GPS)
                box.querySelectorAll('.btn-cheguei').forEach(b => b.addEventListener('click', () => {
                    const d = document.getElementById('destino-' + b.dataset.i);
                    if (d) { d.style.display = 'block'; b.style.display = 'none'; }
                }));
            } catch (e) {
                box.innerHTML = `<div class="vazio">Não foi possível carregar seus eventos agora.</div>`;
                // Mesmo sem a lista, libera o toggle para o monitor sinalizar disponibilidade.
                document.getElementById('disp-toggle').disabled = false;
            }
        }

        function atualizarLegendaDisp(ativo) {
            document.getElementById('disp-legenda').textContent = ativo
                ? 'Você está disponível para trabalhar ✅'
                : 'Avise que está disponível para trabalhar';
        }

        async function alternarDisponibilidade(e) {
            const tog = e.target;
            const desejado = tog.checked;
            tog.disabled = true;
            try {
                const res = await fetch(`${API_BASE}/monitor/disponibilidade`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${monitorToken()}` },
                    body: JSON.stringify({ disponivel: desejado })
                });
                if (!res.ok) throw new Error('http ' + res.status);
                const data = await res.json();
                tog.checked = !!data.disponivelAgora;
                atualizarLegendaDisp(tog.checked);
            } catch (err) {
                tog.checked = !desejado; // reverte
                atualizarLegendaDisp(tog.checked);
                alert('Não foi possível atualizar sua disponibilidade. Tente de novo.');
            } finally {
                tog.disabled = false;
            }
        }

        document.getElementById('disp-toggle').addEventListener('change', alternarDisponibilidade);

        document.addEventListener('monitor:ready', (e) => {
            const nome = (e.detail && e.detail.nome) ? e.detail.nome.split(' ')[0] : '';
            if (nome) document.getElementById('saudacao').textContent = `Olá, ${nome}! 👋`;
            carregarEventos();
        });
    </script>
    <!-- Guard do app do monitor (valida a sessão; carregado por último) -->
    <script src="../js/monitor-protect.js"></script>
</body>

</html>
